<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savings — Daily Life Tracking</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .page-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 28px; }
        .page-header h1 { font-size: 32px; font-weight: 800; color: #0f172a; margin: 0; }
        .header-actions { display: flex; gap: 10px; }
        .btn { padding: 10px 18px; border-radius: 12px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: #7c3aed; color: #fff; }
        .btn-primary:hover { background: #5b21b6; }
        .btn-outline { background: #fff; color: #0f172a; border: 1px solid rgba(148,163,184,0.3); }
        .btn-outline:hover { background: #f1f5f9; }
        .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
        .btn-danger-sm { background: transparent; color: #ef4444; border: none; font-weight: 700; cursor: pointer; font-size: 12px; }

        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
        .stat-card { background: #fff; border: 1px solid rgba(148,163,184,0.18); border-radius: 20px; padding: 20px 22px; box-shadow: 0 8px 20px rgba(15,23,42,0.06); }
        .stat-label { font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
        .stat-value { font-size: 28px; font-weight: 800; color: #7c3aed; }

        .content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 28px; }
        @media (max-width: 900px) { .content-grid { grid-template-columns: 1fr; } }

        .panel { background: #fff; border: 1px solid rgba(148,163,184,0.18); border-radius: 24px; padding: 24px; box-shadow: 0 10px 24px rgba(15,23,42,0.06); }
        .panel h3 { font-size: 18px; font-weight: 700; color: #0f172a; margin: 0 0 20px; }

        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
        .form-group label { font-size: 13px; font-weight: 600; color: #475569; }
        .form-group input, .form-group select { padding: 10px 14px; border-radius: 12px; border: 1px solid rgba(148,163,184,0.3); background: #f8fafc; font-size: 14px; color: #0f172a; outline: none; width: 100%; }
        .form-group input:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.08); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .goals-list { display: flex; flex-direction: column; gap: 16px; }
        .goal-card { background: #f8fafc; border: 1px solid rgba(148,163,184,0.2); border-radius: 18px; padding: 18px; }
        .goal-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .goal-name { font-size: 15px; font-weight: 700; color: #0f172a; }
        .goal-emoji { font-size: 20px; margin-right: 8px; }
        .goal-amounts { font-size: 13px; color: #64748b; margin-bottom: 10px; }
        .goal-amounts strong { color: #0f172a; }
        .goal-bar-wrap { height: 8px; background: #e2e8f0; border-radius: 999px; overflow: hidden; margin-bottom: 10px; }
        .goal-bar-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #7c3aed, #22c55e); transition: width 0.5s ease; }
        .goal-footer { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .goal-pct { font-size: 13px; font-weight: 700; color: #7c3aed; }
        .goal-due { font-size: 12px; color: #94a3b8; }
        .goal-actions { display: flex; gap: 8px; }
        .goal-completed { border-color: #22c55e; background: #f0fdf4; }
        .goal-completed .goal-bar-fill { background: #22c55e; }
        .goal-completed .goal-pct { color: #16a34a; }

        .contrib-list { display: flex; flex-direction: column; gap: 8px; max-height: 340px; overflow-y: auto; }
        .contrib-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: #f8fafc; border: 1px solid rgba(148,163,184,0.16); border-radius: 12px; }
        .contrib-left { display: flex; flex-direction: column; gap: 2px; }
        .contrib-name { font-size: 13px; font-weight: 700; color: #0f172a; }
        .contrib-date { font-size: 11px; color: #94a3b8; }
        .contrib-amount { font-size: 14px; font-weight: 800; color: #16a34a; }

        .chart-wrap { position: relative; height: 260px; }
        .empty-msg { text-align: center; padding: 40px 20px; color: #94a3b8; font-size: 14px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.55); display: flex; align-items: center; justify-content: center; padding: 24px; z-index: 1100; }
        .modal-overlay.hidden { display: none; }
        .modal-card { background: #fff; border-radius: 24px; padding: 28px; width: min(480px, 96%); box-shadow: 0 24px 60px rgba(15,23,42,0.18); position: relative; }
        .modal-card h3 { font-size: 20px; font-weight: 700; margin: 0 0 20px; }
        .modal-close { position: absolute; top: 16px; right: 16px; width: 34px; height: 34px; border-radius: 50%; border: none; background: #f1f5f9; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>
    <button id="toggleSidebar" class="toggle-sidebar-btn">☰ Menu</button>
    <div class="app-shell">
        <div id="sidebar" class="sidebar-container"></div>
        <main class="main-content">
            <div class="container" style="padding-top: 0;">

                <div class="page-header">
                    <div>
                        <h1>🏦 Savings</h1>
                        <p style="color:#64748b; margin-top:4px; font-size:14px;" id="todayLabel"></p>
                    </div>
                    <div class="header-actions">
                        <button class="btn btn-outline" onclick="exportCSV()">⬇ Export CSV</button>
                        <button class="btn btn-primary" onclick="openGoalModal()">+ New Goal</button>
                    </div>
                </div>

                <!-- Stats -->
                <div class="stats-row">
                    <div class="stat-card">
                        <div class="stat-label">Total Saved</div>
                        <div class="stat-value" id="statTotal">₱0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Active Goals</div>
                        <div class="stat-value" id="statGoals">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Goals Completed</div>
                        <div class="stat-value" style="color:#16a34a" id="statDone">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">This Month</div>
                        <div class="stat-value" id="statMonth">₱0</div>
                    </div>
                </div>

                <!-- Chart + Contribute -->
                <div class="content-grid">
                    <div class="panel">
                        <h3>Savings Growth (6 months)</h3>
                        <div class="chart-wrap"><canvas id="growthChart"></canvas></div>
                    </div>
                    <div class="panel">
                        <h3>Add Contribution</h3>
                        <div class="form-group">
                            <label>Goal</label>
                            <select id="contribGoal"></select>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Amount (₱)</label>
                                <input id="contribAmount" type="number" min="0" placeholder="0.00" />
                            </div>
                            <div class="form-group">
                                <label>Date</label>
                                <input id="contribDate" type="date" />
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Note (optional)</label>
                            <input id="contribNote" type="text" placeholder="e.g. Monthly allocation" />
                        </div>
                        <button class="btn btn-primary" style="width:100%;" onclick="addContribution()">Add Contribution</button>

                        <div style="margin-top: 20px;">
                            <h3 style="margin-bottom:12px;">Recent Contributions</h3>
                            <div class="contrib-list" id="contribList">
                                <div class="empty-msg">No contributions yet.</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Goals -->
                <div class="panel" style="margin-bottom:28px;">
                    <h3>Savings Goals</h3>
                    <div class="goals-list" id="goalsList">
                        <div class="empty-msg">No goals yet. Create your first goal!</div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- New Goal Modal -->
    <div class="modal-overlay hidden" id="goalModal">
        <div class="modal-card">
            <button class="modal-close" onclick="closeGoalModal()">×</button>
            <h3>Create Savings Goal</h3>
            <div class="form-group">
                <label>Goal Name</label>
                <input id="goalName" type="text" placeholder="e.g. Emergency Fund" />
            </div>
            <div class="form-group">
                <label>Emoji Icon</label>
                <input id="goalEmoji" type="text" placeholder="🎯" maxlength="2" />
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Target Amount (₱)</label>
                    <input id="goalTarget" type="number" min="0" placeholder="50000" />
                </div>
                <div class="form-group">
                    <label>Target Date</label>
                    <input id="goalDate" type="date" />
                </div>
            </div>
            <button class="btn btn-primary" style="width:100%;" onclick="createGoal()">Create Goal</button>
        </div>
    </div>

    <!-- Contribute to Specific Goal Modal -->
    <div class="modal-overlay hidden" id="contribModal">
        <div class="modal-card">
            <button class="modal-close" onclick="closeContribModal()">×</button>
            <h3 id="contribModalTitle">Add Contribution</h3>
            <div class="form-group">
                <label>Amount (₱)</label>
                <input id="modalContribAmount" type="number" min="0" placeholder="0.00" />
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Date</label>
                    <input id="modalContribDate" type="date" />
                </div>
                <div class="form-group">
                    <label>Note</label>
                    <input id="modalContribNote" type="text" placeholder="Optional" />
                </div>
            </div>
            <button class="btn btn-primary" style="width:100%;" onclick="saveModalContrib()">Add</button>
        </div>
    </div>

    <script src="../script.js"></script>
    <script>
    const GOALS_KEY = 'savingsGoals';
    const CONTRIBS_KEY = 'savingsContributions';
    let goals = [];
    let contributions = [];
    let modalGoalId = null;

    function load() {
        try { goals = JSON.parse(localStorage.getItem(GOALS_KEY)) || []; } catch { goals = []; }
        try { contributions = JSON.parse(localStorage.getItem(CONTRIBS_KEY)) || []; } catch { contributions = []; }
    }
    function save() {
        localStorage.setItem(GOALS_KEY, JSON.stringify(goals));
        localStorage.setItem(CONTRIBS_KEY, JSON.stringify(contributions));
    }
    function genId() { return Date.now() + '_' + Math.random().toString(36).slice(2); }

    // ── Goals ─────────────────────────────────────────────────
    function openGoalModal() { document.getElementById('goalModal').classList.remove('hidden'); }
    function closeGoalModal() { document.getElementById('goalModal').classList.add('hidden'); }

    function createGoal() {
        const name = document.getElementById('goalName').value.trim();
        const emoji = document.getElementById('goalEmoji').value.trim() || '🎯';
        const target = parseFloat(document.getElementById('goalTarget').value);
        const date = document.getElementById('goalDate').value;
        if (!name || !target || target <= 0) { alert('Please fill in goal name and target amount.'); return; }
        goals.push({ id: genId(), name, emoji, target, date });
        save(); closeGoalModal();
        document.getElementById('goalName').value = '';
        document.getElementById('goalEmoji').value = '';
        document.getElementById('goalTarget').value = '';
        document.getElementById('goalDate').value = '';
        refresh();
    }

    function deleteGoal(id) {
        if (!confirm('Delete this goal and all its contributions?')) return;
        goals = goals.filter(g => g.id !== id);
        contributions = contributions.filter(c => c.goalId !== id);
        save(); refresh();
    }

    function getSaved(goalId) {
        return contributions.filter(c => c.goalId === goalId).reduce((s, c) => s + c.amount, 0);
    }

    function renderGoals() {
        const el = document.getElementById('goalsList');
        if (goals.length === 0) { el.innerHTML = '<div class="empty-msg">No goals yet. Create your first goal!</div>'; return; }
        el.innerHTML = goals.map(g => {
            const saved = getSaved(g.id);
            const pct = Math.min(100, g.target > 0 ? Math.round((saved / g.target) * 100) : 0);
            const done = pct >= 100;
            const remaining = Math.max(0, g.target - saved);
            return `
            <div class="goal-card ${done ? 'goal-completed' : ''}">
                <div class="goal-top">
                    <div>
                        <span class="goal-emoji">${g.emoji}</span>
                        <span class="goal-name">${g.name}</span>
                        ${done ? ' <span style="color:#16a34a;font-size:12px;font-weight:700;">✓ COMPLETE</span>' : ''}
                    </div>
                    <div class="goal-actions">
                        <button class="btn btn-primary btn-sm" onclick="openContribModal('${g.id}', '${g.name}')">+ Add</button>
                        <button class="btn-danger-sm" onclick="deleteGoal('${g.id}')">✕</button>
                    </div>
                </div>
                <div class="goal-amounts">
                    Saved: <strong>₱${saved.toLocaleString('en-PH', {minimumFractionDigits:2})}</strong> of
                    <strong>₱${Number(g.target).toLocaleString('en-PH', {minimumFractionDigits:2})}</strong>
                    ${!done ? ` · Remaining: <strong>₱${remaining.toLocaleString('en-PH',{minimumFractionDigits:2})}</strong>` : ''}
                </div>
                <div class="goal-bar-wrap"><div class="goal-bar-fill" style="width:${pct}%"></div></div>
                <div class="goal-footer">
                    <span class="goal-pct">${pct}%</span>
                    ${g.date ? `<span class="goal-due">🗓 Target: ${g.date}</span>` : ''}
                </div>
            </div>`;
        }).join('');
    }

    // ── Contributions ─────────────────────────────────────────
    function openContribModal(goalId, goalName) {
        modalGoalId = goalId;
        document.getElementById('contribModalTitle').textContent = `Add to: ${goalName}`;
        document.getElementById('modalContribDate').value = new Date().toISOString().split('T')[0];
        document.getElementById('contribModal').classList.remove('hidden');
    }
    function closeContribModal() { document.getElementById('contribModal').classList.add('hidden'); modalGoalId = null; }

    function saveModalContrib() {
        const amount = parseFloat(document.getElementById('modalContribAmount').value);
        const date = document.getElementById('modalContribDate').value;
        const note = document.getElementById('modalContribNote').value.trim();
        if (!amount || amount <= 0 || !date) { alert('Please enter an amount and date.'); return; }
        contributions.unshift({ id: genId(), goalId: modalGoalId, amount, date, note });
        save(); closeContribModal();
        document.getElementById('modalContribAmount').value = '';
        document.getElementById('modalContribNote').value = '';
        refresh();
    }

    function addContribution() {
        const goalId = document.getElementById('contribGoal').value;
        const amount = parseFloat(document.getElementById('contribAmount').value);
        const date = document.getElementById('contribDate').value;
        const note = document.getElementById('contribNote').value.trim();
        if (!goalId || !amount || amount <= 0 || !date) { alert('Please fill in all fields.'); return; }
        contributions.unshift({ id: genId(), goalId, amount, date, note });
        save();
        document.getElementById('contribAmount').value = '';
        document.getElementById('contribNote').value = '';
        refresh();
    }

    function populateGoalSelect() {
        const sel = document.getElementById('contribGoal');
        sel.innerHTML = goals.length === 0
            ? '<option value="">No goals yet</option>'
            : goals.map(g => `<option value="${g.id}">${g.emoji} ${g.name}</option>`).join('');
    }

    function renderContributions() {
        const el = document.getElementById('contribList');
        const recent = contributions.slice(0, 20);
        if (recent.length === 0) { el.innerHTML = '<div class="empty-msg">No contributions yet.</div>'; return; }
        el.innerHTML = recent.map(c => {
            const g = goals.find(g => g.id === c.goalId);
            return `
            <div class="contrib-item">
                <div class="contrib-left">
                    <div class="contrib-name">${g ? `${g.emoji} ${g.name}` : 'Unknown goal'}</div>
                    <div class="contrib-date">${c.date}${c.note ? ' · ' + c.note : ''}</div>
                </div>
                <div style="display:flex;align-items:center;gap:10px;">
                    <div class="contrib-amount">+₱${Number(c.amount).toLocaleString('en-PH',{minimumFractionDigits:2})}</div>
                    <button class="btn-danger-sm" onclick="deleteContrib('${c.id}')">✕</button>
                </div>
            </div>`;
        }).join('');
    }

    function deleteContrib(id) {
        contributions = contributions.filter(c => c.id !== id);
        save(); refresh();
    }

    // ── Stats ─────────────────────────────────────────────────
    function updateStats() {
        const total = contributions.reduce((s, c) => s + c.amount, 0);
        const active = goals.filter(g => getSaved(g.id) < g.target).length;
        const done = goals.filter(g => getSaved(g.id) >= g.target && g.target > 0).length;
        const now = new Date();
        const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
        const monthTotal = contributions.filter(c => c.date?.startsWith(thisMonth)).reduce((s,c) => s+c.amount, 0);
        const fmt = v => '₱' + v.toLocaleString('en-PH', { minimumFractionDigits: 2 });
        document.getElementById('statTotal').textContent = fmt(total);
        document.getElementById('statGoals').textContent = active;
        document.getElementById('statDone').textContent = done;
        document.getElementById('statMonth').textContent = fmt(monthTotal);
    }

    // ── Chart ─────────────────────────────────────────────────
    let growthChart = null;
    function renderChart() {
        const ctx = document.getElementById('growthChart');
        if (!ctx || typeof Chart === 'undefined') return;
        if (growthChart) growthChart.destroy();

        const months = [];
        for (let i = 5; i >= 0; i--) {
            const d = new Date(); d.setMonth(d.getMonth() - i);
            months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
        }

        let running = 0;
        const data = months.map(m => {
            running += contributions.filter(c => c.date?.startsWith(m)).reduce((s,c) => s+c.amount, 0);
            return running;
        });
        const labels = months.map(m => { const [y,mo] = m.split('-'); return new Date(y, mo-1).toLocaleString('en',{month:'short'}); });

        growthChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels,
                datasets: [{
                    label: 'Cumulative Savings',
                    data,
                    borderColor: '#7c3aed',
                    backgroundColor: 'rgba(124,58,237,0.12)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 5,
                    pointBackgroundColor: '#7c3aed'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { grid: { display: false } },
                    y: { beginAtZero: true, ticks: { callback: v => '₱'+v.toLocaleString() } }
                }
            }
        });
    }

    // ── Export ────────────────────────────────────────────────
    function exportCSV() {
        if (contributions.length === 0) { alert('No data to export.'); return; }
        const header = 'Date,Goal,Amount,Note';
        const rows = contributions.map(c => {
            const g = goals.find(g => g.id === c.goalId);
            return `${c.date},"${g ? g.name : 'Unknown'}",${c.amount},"${c.note||''}"`;
        });
        const csv = [header, ...rows].join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url;
        a.download = `savings_export_${new Date().toISOString().slice(0,10)}.csv`;
        a.click(); URL.revokeObjectURL(url);
    }

    // ── Init ──────────────────────────────────────────────────
    function refresh() {
        populateGoalSelect();
        renderGoals();
        renderContributions();
        updateStats();
        renderChart();
    }

    document.addEventListener('DOMContentLoaded', () => {
        load();
        document.getElementById('todayLabel').textContent = new Date().toDateString();
        document.getElementById('contribDate').value = new Date().toISOString().split('T')[0];
        document.getElementById('modalContribDate').value = new Date().toISOString().split('T')[0];
        refresh();
    });
    </script>
</body>
</html>
