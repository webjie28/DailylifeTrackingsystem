<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Watchlist — Daily Life Tracking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        .page-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 28px; }
        .page-header h1 { font-size: 32px; font-weight: 800; color: var(--text-primary); margin: 0; }
        .btn { padding: 10px 18px; border-radius: 12px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: var(--accent-pink); color: #fff; }
        .btn-primary:hover { background: #d01c7a; }
        .btn-outline { background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border-color-strong); }
        .btn-outline:hover { background: var(--bg-subtle); }
        .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }

        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; padding: 20px 22px; box-shadow: var(--shadow-sm); }
        .stat-label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
        .stat-value { font-size: 28px; font-weight: 800; color: var(--accent-pink); }

        .content-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 24px; margin-bottom: 28px; }
        @media (max-width: 900px) { .content-grid { grid-template-columns: 1fr; } }

        .panel { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 24px; padding: 24px; box-shadow: var(--shadow-sm); }
        .panel h3 { font-size: 18px; font-weight: 700; color: var(--text-primary); margin: 0 0 20px; }

        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
        .form-group label { font-size: 13px; font-weight: 600; color: var(--text-secondary); }
        .form-group input, .form-group select { padding: 10px 14px; border-radius: 12px; border: 1px solid var(--border-color-strong); background: var(--bg-input-inset); font-size: 14px; color: var(--text-primary); outline: none; width: 100%; font-family: inherit; }
        .form-group input:focus, .form-group select:focus { border-color: var(--accent-pink); box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.15); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        /* Anime Cards */
        .anime-list { display: flex; flex-direction: column; gap: 16px; }
        .anime-card { background: var(--bg-input-inset); border: 1px solid var(--border-color); border-radius: 18px; padding: 18px; position: relative; transition: all 0.2s; }
        .anime-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); }
        .anime-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .anime-title-wrap { display: flex; align-items: center; gap: 8px; }
        .anime-emoji { font-size: 20px; }
        .anime-title { font-size: 15px; font-weight: 700; color: var(--text-primary); }
        .anime-rating { font-size: 12px; color: #fb923c; font-weight: 700; margin-top: 2px; }
        
        .anime-progress { font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; display: flex; justify-content: space-between; }
        .ep-controls { display: flex; gap: 6px; }
        .ep-btn { background: var(--border-color-strong); border: none; font-weight: 800; padding: 2px 8px; border-radius: 6px; cursor: pointer; color: var(--text-primary); }
        .ep-btn:hover { background: var(--accent-pink); color: white; }

        .anime-bar-wrap { height: 8px; background: var(--border-color-strong); border-radius: 999px; overflow: hidden; margin-bottom: 10px; }
        .anime-bar-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-pink), var(--accent-purple)); transition: width 0.5s ease; }
        
        .anime-footer { display: flex; justify-content: space-between; align-items: center; }
        .anime-pct { font-size: 13px; font-weight: 700; color: var(--accent-pink); }
        
        .anime-status-badge { font-size: 11px; font-weight: 700; padding: 4px 8px; border-radius: 6px; }
        .status-watching { background: rgba(236, 72, 153, 0.15); color: var(--accent-pink); }
        .status-completed { background: rgba(74, 222, 128, 0.15); color: var(--accent-green); }
        .status-plantowatch { background: var(--border-color-strong); color: var(--text-secondary); }
        .status-dropped { background: rgba(239, 68, 68, 0.15); color: var(--accent-red); }

        .anime-actions { display: flex; gap: 6px; }
        .anime-btn-danger { background: transparent; color: var(--accent-red); border: none; font-weight: 700; cursor: pointer; font-size: 12px; }
        .anime-btn-edit { background: transparent; color: var(--accent-pink); border: none; font-weight: 700; cursor: pointer; font-size: 12px; }

        /* Search + Filter */
        .controls-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
        .search-input { padding: 8px 14px; border-radius: 12px; border: 1px solid var(--border-color-strong); background: var(--bg-card); color: var(--text-primary); outline: none; font-size: 13px; width: min(280px, 100%); }
        .search-input:focus { border-color: var(--accent-pink); }

        .tabs { display: flex; gap: 8px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; overflow-x: auto; }
        .tab-btn { background: transparent; border: none; padding: 6px 12px; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-radius: 8px; white-space: nowrap; }
        .tab-btn.active { background: rgba(236, 72, 153, 0.15); color: var(--accent-pink); }

        .empty-msg { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; }
    </style>
</head>
<body>
    <button id="toggleSidebar" class="toggle-sidebar-btn">☰ Menu</button>
    <div class="app-shell">
        <div id="sidebar" class="sidebar-container"></div>
        <main class="main-content">
            <div class="container" style="padding-top: 0;">
                
                <header class="page-header">
                    <div>
                        <h1>Anime Watchlist</h1>
                        <p class="header-sub">Track and organize the shows and movies you watch</p>
                    </div>
                    <button class="btn btn-primary" onclick="openAnimeModal()">+ Add Anime</button>
                </header>

                <!-- Stats Row -->
                <section class="stats-row">
                    <div class="stat-card">
                        <div class="stat-label">Total Watchlist</div>
                        <div class="stat-value" id="statTotal">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Watching Now</div>
                        <div class="stat-value" id="statWatching" style="color: var(--accent-pink);">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Completed Shows</div>
                        <div class="stat-value" id="statCompleted" style="color: var(--accent-green);">0</div>
                    </div>
                </section>

                <div class="panel">
                    <div class="controls-row">
                        <div class="tabs">
                            <button class="tab-btn active" id="tabAll" onclick="setFilter('all')">All Shows</button>
                            <button class="tab-btn" id="tabWatching" onclick="setFilter('watching')">Watching</button>
                            <button class="tab-btn" id="tabCompleted" onclick="setFilter('completed')">Completed</button>
                            <button class="tab-btn" id="tabPlan" onclick="setFilter('plantowatch')">Plan to Watch</button>
                            <button class="tab-btn" id="tabDropped" onclick="setFilter('dropped')">Dropped</button>
                        </div>
                        <input type="text" id="searchInput" class="search-input" placeholder=" Search watchlist..." oninput="renderAnime()" />
                    </div>

                    <div class="anime-list" id="animeList">
                        <div class="empty-msg">No shows tracked yet. Click "+ Add Anime" to begin.</div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Add Anime Modal -->
    <div class="modal-overlay hidden" id="animeModal">
        <div class="modal-card">
            <button class="modal-close" onclick="closeAnimeModal()">×</button>
            <div class="modal-header">
                <h3 id="modalTitle">Add New Anime</h3>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Anime Title</label>
                    <input type="text" id="animeTitle" placeholder="e.g. Demon Slayer" />
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Current Episode</label>
                        <input type="number" id="animeCurrentEp" min="0" value="0" />
                    </div>
                    <div class="form-group">
                        <label>Total Episodes</label>
                        <input type="number" id="animeTotalEp" min="1" value="12" />
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Status</label>
                        <select id="animeStatus" onchange="toggleRatingField()">
                            <option value="watching">Watching</option>
                            <option value="completed">Completed</option>
                            <option value="plantowatch">Plan to Watch</option>
                            <option value="dropped">Dropped</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Rating (1-10)</label>
                        <select id="animeRating">
                            <option value="0">Unrated</option>
                            <option value="10"> 10 - Masterpiece</option>
                            <option value="9"> 9 - Great</option>
                            <option value="8"> 8 - Very Good</option>
                            <option value="7"> 7 - Good</option>
                            <option value="6"> 6 - Fine</option>
                            <option value="5"> 5 - Average</option>
                            <option value="4"> 4 - Bad</option>
                            <option value="3"> 3 - Very Bad</option>
                            <option value="2"> 2 - Horrible</option>
                            <option value="1"> 1 - Appalling</option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-primary" style="width: 100%; margin-top: 10px;" onclick="saveAnime()">Save Anime</button>
            </div>
        </div>
    </div>

    <script src="../script.js"></script>
    <script>
        const STORAGE_KEY = 'animeWatchlist';
        let animeList = [];
        let currentFilter = 'all';
        let activeAnimeId = null;

        function loadData() {
            try {
                animeList = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            } catch {
                animeList = [];
            }
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(animeList));
            updateStats();
        }

        function updateStats() {
            document.getElementById('statTotal').textContent = animeList.length;
            document.getElementById('statWatching').textContent = animeList.filter(a => a.status === 'watching').length;
            document.getElementById('statCompleted').textContent = animeList.filter(a => a.status === 'completed').length;
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if(filter === 'all') document.getElementById('tabAll').classList.add('active');
            if(filter === 'watching') document.getElementById('tabWatching').classList.add('active');
            if(filter === 'completed') document.getElementById('tabCompleted').classList.add('active');
            if(filter === 'plantowatch') document.getElementById('tabPlan').classList.add('active');
            if(filter === 'dropped') document.getElementById('tabDropped').classList.add('active');
            renderAnime();
        }

        function toggleRatingField() {
            const status = document.getElementById('animeStatus').value;
            const ratingField = document.getElementById('animeRating');
            if (status === 'completed') {
                if (ratingField.value === '0') ratingField.value = '8';
            }
        }

        function changeEpisode(id, delta) {
            animeList = animeList.map(a => {
                if (a.id === id) {
                    const total = parseInt(a.totalEp) || 1;
                    let curr = (parseInt(a.currentEp) || 0) + delta;
                    curr = Math.max(0, Math.min(total, curr));
                    let status = a.status;
                    if(curr === total) status = 'completed';
                    return { ...a, currentEp: curr, status };
                }
                return a;
            });
            saveData();
            renderAnime();
        }

        function renderAnime() {
            const listEl = document.getElementById('animeList');
            const search = document.getElementById('searchInput').value.toLowerCase().trim();
            
            let filtered = animeList;
            if (currentFilter !== 'all') {
                filtered = animeList.filter(a => a.status === currentFilter);
            }
            if (search) {
                filtered = filtered.filter(a => a.title.toLowerCase().includes(search));
            }

            if (filtered.length === 0) {
                listEl.innerHTML = `<div class="empty-msg">No shows found.</div>`;
                return;
            }

            listEl.innerHTML = filtered.map(a => {
                const total = parseInt(a.totalEp) || 1;
                const curr = parseInt(a.currentEp) || 0;
                const pct = Math.min(100, Math.round((curr / total) * 100));

                let badgeText = 'Plan to Watch';
                let badgeClass = 'status-plantowatch';
                if(a.status === 'watching') { badgeText = 'Watching'; badgeClass = 'status-watching'; }
                if(a.status === 'completed') { badgeText = 'Completed'; badgeClass = 'status-completed'; }
                if(a.status === 'dropped') { badgeText = 'Dropped'; badgeClass = 'status-dropped'; }

                const starsText = parseInt(a.rating) > 0 ? ` ${a.rating}/10` : '';

                return `
                    <div class="anime-card">
                        <div class="anime-top">
                            <div class="anime-title-wrap">
                                <span class="anime-emoji">${a.emoji || ''}</span>
                                <div>
                                    <div class="anime-title">${a.title}</div>
                                    <div class="anime-rating">${starsText}</div>
                                </div>
                            </div>
                            <span class="anime-status-badge ${badgeClass}">${badgeText}</span>
                        </div>
                        <div class="anime-progress">
                            <div>Episode ${curr} of ${total}</div>
                            <div class="ep-controls">
                                <button class="ep-btn" onclick="changeEpisode('${a.id}', -1)">-</button>
                                <button class="ep-btn" onclick="changeEpisode('${a.id}', 1)">+</button>
                            </div>
                        </div>
                        <div class="anime-bar-wrap">
                            <div class="anime-bar-fill" style="width: ${pct}%"></div>
                        </div>
                        <div class="anime-footer">
                            <span class="anime-pct">${pct}% Watched</span>
                            <div class="anime-actions">
                                <button class="anime-btn-edit" onclick="editAnime('${a.id}')">️ Edit</button>
                                <button class="anime-btn-danger" onclick="deleteAnime('${a.id}')">️ Delete</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openAnimeModal() {
            activeAnimeId = null;
            document.getElementById('modalTitle').textContent = 'Add New Anime';
            document.getElementById('animeTitle').value = '';
            document.getElementById('animeCurrentEp').value = 0;
            document.getElementById('animeTotalEp').value = 12;
            document.getElementById('animeStatus').value = 'watching';
            document.getElementById('animeRating').value = 0;
            document.getElementById('animeModal').classList.remove('hidden');
        }

        function closeAnimeModal() {
            document.getElementById('animeModal').classList.add('hidden');
        }

        function editAnime(id) {
            const a = animeList.find(anime => anime.id === id);
            if (!a) return;
            activeAnimeId = id;
            document.getElementById('modalTitle').textContent = 'Edit Anime';
            document.getElementById('animeTitle').value = a.title;
            document.getElementById('animeCurrentEp').value = a.currentEp;
            document.getElementById('animeTotalEp').value = a.totalEp;
            document.getElementById('animeStatus').value = a.status;
            document.getElementById('animeRating').value = a.rating || 0;
            document.getElementById('animeModal').classList.remove('hidden');
        }

        function saveAnime() {
            const title = document.getElementById('animeTitle').value.trim();
            const curr = parseInt(document.getElementById('animeCurrentEp').value) || 0;
            const total = parseInt(document.getElementById('animeTotalEp').value) || 1;
            const status = document.getElementById('animeStatus').value;
            const rating = document.getElementById('animeRating').value;
            const emoji = '';

            if (!title) { alert('Please enter anime title.'); return; }

            if (activeAnimeId) {
                // Edit
                animeList = animeList.map(a => a.id === activeAnimeId ? { ...a, title, currentEp: curr, totalEp: total, status, rating, emoji } : a);
            } else {
                // Add
                animeList.push({
                    id: Date.now().toString(),
                    title,
                    currentEp: curr,
                    totalEp: total,
                    status,
                    rating,
                    emoji
                });
            }

            saveData();
            closeAnimeModal();
            renderAnime();
        }

        function deleteAnime(id) {
            if(!confirm('Remove this anime from your watchlist?')) return;
            animeList = animeList.filter(a => a.id !== id);
            saveData();
            renderAnime();
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            updateStats();
            renderAnime();
        });
    </script>
</body>
</html>
