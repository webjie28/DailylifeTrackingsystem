<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events &amp; Calendar — Daily Life Tracking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        .page-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 28px; }
        .page-header h1 { font-size: 32px; font-weight: 800; color: var(--text-primary); margin: 0; }
        .btn { padding: 10px 18px; border-radius: 12px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: #06b6d4; color: #fff; }
        .btn-primary:hover { background: #0891b2; }
        .btn-outline { background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border-color-strong); }
        .btn-outline:hover { background: var(--bg-subtle); }
        .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }

        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; padding: 20px 22px; box-shadow: var(--shadow-sm); }
        .stat-label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
        .stat-value { font-size: 28px; font-weight: 800; color: #06b6d4; }

        .content-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 24px; margin-bottom: 28px; }
        @media (max-width: 900px) { .content-grid { grid-template-columns: 1fr; } }

        .panel { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 24px; padding: 24px; box-shadow: var(--shadow-sm); }
        .panel h3 { font-size: 18px; font-weight: 700; color: var(--text-primary); margin: 0 0 20px; }

        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
        .form-group label { font-size: 13px; font-weight: 600; color: var(--text-secondary); }
        .form-group input, .form-group select { padding: 10px 14px; border-radius: 12px; border: 1px solid var(--border-color-strong); background: var(--bg-input-inset); font-size: 14px; color: var(--text-primary); outline: none; width: 100%; font-family: inherit; }
        .form-group input:focus, .form-group select:focus { border-color: #06b6d4; box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.15); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        /* Calendar Grid */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .calendar-title { font-size: 18px; font-weight: 800; color: var(--text-primary); }
        .calendar-days { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: 700; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .calendar-cell { aspect-ratio: 1.1; background: var(--bg-input-inset); border: 1px solid var(--border-color); border-radius: 10px; padding: 6px; display: flex; flex-direction: column; justify-content: space-between; position: relative; transition: all 0.2s; }
        .calendar-cell:hover { border-color: #06b6d4; transform: scale(1.02); }
        .calendar-cell-num { font-size: 12px; font-weight: 700; color: var(--text-secondary); }
        .calendar-cell.other-month { opacity: 0.3; }
        .calendar-cell.today { border: 2px solid #06b6d4; background: rgba(6, 182, 212, 0.05); }
        .cell-dots { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 4px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; }

        /* Event Cards */
        .events-list { display: flex; flex-direction: column; gap: 12px; max-height: 480px; overflow-y: auto; }
        .event-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background: var(--bg-input-inset); border: 1px solid var(--border-color); border-radius: 16px; transition: all 0.2s; }
        .event-item:hover { transform: translateX(2px); border-color: #06b6d4; }
        .event-info { display: flex; align-items: center; gap: 12px; }
        .event-date-badge { text-align: center; padding: 6px 10px; border-radius: 10px; background: var(--border-color-strong); min-width: 54px; }
        .date-month { font-size: 10px; text-transform: uppercase; font-weight: 800; color: var(--text-muted); }
        .date-day { font-size: 18px; font-weight: 800; color: var(--text-primary); line-height: 1; margin-top: 2px; }
        
        .event-details { display: flex; flex-direction: column; gap: 2px; }
        .event-name { font-size: 14px; font-weight: 700; color: var(--text-primary); }
        
        .event-badge { font-size: 10px; font-weight: 800; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; width: fit-content; }
        .badge-personal { background: rgba(124, 58, 237, 0.15); color: var(--accent-purple); }
        .badge-work { background: rgba(59, 130, 246, 0.15); color: var(--accent-blue); }
        .badge-bills { background: rgba(249, 115, 22, 0.15); color: var(--accent-orange); }
        .badge-birthday { background: rgba(236, 72, 153, 0.15); color: var(--accent-pink); }
        .badge-holiday { background: rgba(74, 222, 128, 0.15); color: var(--accent-green); }

        .btn-delete { background: transparent; border: none; color: var(--accent-red); font-weight: 700; cursor: pointer; font-size: 12px; }

        .empty-msg { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; }
    </style>
</head>
<body>
    <button id="toggleSidebar" class="toggle-sidebar-btn">☰ Menu</button>
    <div class="app-shell">
        <div id="sidebar" class="sidebar-container"></div>
        <main class="main-content">
            <div class="container" style="padding-top: 0;">
                
                <header class="page-header">
                    <div>
                        <h1>Events &amp; Calendar</h1>
                        <p class="header-sub">Keep track of your personal milestones, appointments, and due dates</p>
                    </div>
                    <button class="btn btn-primary" onclick="openEventModal()">+ Add New Event</button>
                </header>

                <!-- Stats Row -->
                <section class="stats-row">
                    <div class="stat-card">
                        <div class="stat-label">Total Events</div>
                        <div class="stat-value" id="statTotal">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Next Event In</div>
                        <div class="stat-value" id="statCountdown" style="color: var(--accent-purple); font-size: 22px; padding-top: 5px;">0 days</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">This Month's Events</div>
                        <div class="stat-value" id="statMonth" style="color: var(--accent-green);">0</div>
                    </div>
                </section>

                <div class="content-grid">
                    <!-- Left: Calendar view -->
                    <div class="panel">
                        <div class="calendar-header">
                            <div class="calendar-title" id="monthYearTitle">June 2026</div>
                            <div style="display: flex; gap: 8px;">
                                <button class="btn btn-outline btn-sm" onclick="changeMonth(-1)">◀ Prev</button>
                                <button class="btn btn-outline btn-sm" onclick="changeMonth(1)">Next ▶</button>
                            </div>
                        </div>
                        <div class="calendar-days">
                            <div>SUN</div><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div>
                        </div>
                        <div class="calendar-grid" id="calendarGrid"></div>
                    </div>

                    <!-- Right: Upcoming list -->
                    <div class="panel">
                        <h3> Upcoming Events List</h3>
                        <div class="events-list" id="eventsList">
                            <div class="empty-msg">No upcoming events. Click "+ Add New Event" to register.</div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Event Modal -->
    <div class="modal-overlay hidden" id="eventModal">
        <div class="modal-card">
            <button class="modal-close" onclick="closeEventModal()">×</button>
            <div class="modal-header">
                <h3>Add New Event</h3>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Event Title</label>
                    <input type="text" id="eventTitle" placeholder="e.g. Dentists Appointment" />
                </div>
                <div class="form-row" style="margin-bottom: 20px;">
                    <div class="form-group">
                        <label>Event Date</label>
                        <input type="date" id="eventDate" />
                    </div>
                    <div class="form-group">
                        <label>Event Type</label>
                        <select id="eventType">
                            <option value="personal"> Personal</option>
                            <option value="work"> Work</option>
                            <option value="bills"> Bills Due</option>
                            <option value="birthday"> Birthday</option>
                            <option value="holiday"> Holiday</option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-primary" style="width: 100%;" onclick="saveEvent()">Save Event</button>
            </div>
        </div>
    </div>

    <script src="../script.js"></script>
    <script>
        const STORAGE_KEY = 'eventsList';
        const MONTHS = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        const DOT_COLORS = {
            personal: '#7c3aed',
            work: '#3b82f6',
            bills: '#f97316',
            birthday: '#ec4899',
            holiday: '#22c55e'
        };
        
        let events = [];
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();

        function loadData() {
            try {
                events = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            } catch {
                events = [];
            }
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
            updateStats();
        }

        function updateStats() {
            document.getElementById('statTotal').textContent = events.length;

            // This month's events count
            const thisMonthEvents = events.filter(e => {
                const d = new Date(e.date);
                return d.getMonth() === new Date().getMonth() && d.getFullYear() === new Date().getFullYear();
            }).length;
            document.getElementById('statMonth').textContent = thisMonthEvents;

            // Next event countdown
            const today = new Date();
            today.setHours(0,0,0,0);
            
            const futureEvents = events
                .map(e => ({ ...e, parsedDate: new Date(e.date + 'T00:00:00') }))
                .filter(e => e.parsedDate >= today)
                .sort((a, b) => a.parsedDate - b.parsedDate);

            if (futureEvents.length > 0) {
                const diffTime = futureEvents[0].parsedDate - today;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                if (diffDays === 0) {
                    document.getElementById('statCountdown').textContent = 'Today! ';
                } else if (diffDays === 1) {
                    document.getElementById('statCountdown').textContent = 'Tomorrow! ⏰';
                } else {
                    document.getElementById('statCountdown').textContent = `${diffDays} days`;
                }
            } else {
                document.getElementById('statCountdown').textContent = 'None';
            }
        }

        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            } else if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            renderCalendar();
        }

        function renderCalendar() {
            document.getElementById('monthYearTitle').textContent = `${MONTHS[currentMonth]} ${currentYear}`;
            const gridEl = document.getElementById('calendarGrid');
            gridEl.innerHTML = '';

            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const prevMonthDays = new Date(currentYear, currentMonth, 0).getDate();

            // Previous month buffer cells
            for (let i = firstDay - 1; i >= 0; i--) {
                const dayNum = prevMonthDays - i;
                gridEl.innerHTML += `
                    <div class="calendar-cell other-month">
                        <span class="calendar-cell-num">${dayNum}</span>
                    </div>
                `;
            }

            // Current month cells
            const today = new Date();
            for (let day = 1; day <= daysInMonth; day++) {
                const cellDateStr = `${currentYear}-${(currentMonth + 1).toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
                const cellEvents = events.filter(e => e.date === cellDateStr);

                const isToday = today.getDate() === day && today.getMonth() === currentMonth && today.getFullYear() === currentYear;
                const activeClass = isToday ? 'today' : '';

                const dotsHtml = cellEvents.map(e => `
                    <div class="dot" style="background: ${DOT_COLORS[e.type] || '#7c3aed'};" title="${e.title}"></div>
                `).join('');

                gridEl.innerHTML += `
                    <div class="calendar-cell ${activeClass}">
                        <span class="calendar-cell-num">${day}</span>
                        <div class="cell-dots">${dotsHtml}</div>
                    </div>
                `;
            }
        }

        function renderEventsList() {
            const listEl = document.getElementById('eventsList');
            const today = new Date();
            today.setHours(0,0,0,0);

            const sorted = [...events]
                .map(e => ({ ...e, parsedDate: new Date(e.date + 'T00:00:00') }))
                .sort((a, b) => a.parsedDate - b.parsedDate);

            if (sorted.length === 0) {
                listEl.innerHTML = '<div class="empty-msg">No upcoming events tracked.</div>';
                return;
            }

            listEl.innerHTML = sorted.map(e => {
                const d = e.parsedDate;
                const mStr = d.toLocaleString('en-US', { month: 'short' });
                const dayNum = d.getDate();

                return `
                    <div class="event-item">
                        <div class="event-info">
                            <div class="event-date-badge">
                                <div class="date-month">${mStr}</div>
                                <div class="date-day">${dayNum}</div>
                            </div>
                            <div class="event-details">
                                <span class="event-name">${e.title}</span>
                                <span class="event-badge badge-${e.type}">${e.type}</span>
                            </div>
                        </div>
                        <button class="btn-delete" onclick="deleteEvent('${e.id}')">️</button>
                    </div>
                `;
            }).join('');
        }

        function openEventModal() {
            document.getElementById('eventTitle').value = '';
            document.getElementById('eventDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('eventType').value = 'personal';
            document.getElementById('eventModal').classList.remove('hidden');
        }

        function closeEventModal() {
            document.getElementById('eventModal').classList.add('hidden');
        }

        function saveEvent() {
            const title = document.getElementById('eventTitle').value.trim();
            const date = document.getElementById('eventDate').value;
            const type = document.getElementById('eventType').value;

            if (!title || !date) { alert('Please fill in title and date.'); return; }

            events.push({
                id: Date.now().toString(),
                title,
                date,
                type
            });

            saveData();
            closeEventModal();
            renderCalendar();
            renderEventsList();
        }

        function deleteEvent(id) {
            if (!confirm('Remove this event?')) return;
            events = events.filter(e => e.id !== id);
            saveData();
            renderCalendar();
            renderEventsList();
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            updateStats();
            renderCalendar();
            renderEventsList();
        });
    </script>
</body>
</html>
