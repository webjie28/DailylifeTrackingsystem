<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Walk Tracker</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <button id="toggleSidebar" class="toggle-sidebar-btn">☰ Menu</button>
    
    <div class="app-shell">
        <div id="sidebar" class="sidebar-container"></div>

        <main class="main-content">
            <div class="container" style="padding-top: 0;">
                <header class="minimal-header" style="margin-top: 20px; margin-bottom: 30px;">
                    <h1>Daily Walk Tracker</h1>
                    <p>I-record ang steps mo at tingnan ang calories burned (1 step ≈ 0.04 kcal)</p>
                </header>

                <section class="minimal-cards" style="margin-bottom: 40px;">
                    <article class="card chart-card" style="width: 100%; max-width: 600px;">
                        <h3 style="margin-bottom: 15px;">Log Steps for Today</h3>
                        <div style="display: flex; gap: 10px;">
                            <input type="number" id="stepInput" placeholder="Enter steps (e.g., 8500)" style="flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #cbd5e1; font-size: 16px;">
                            <button id="saveStepsBtn" style="padding: 12px 24px; background: #22c55e; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer;">Save</button>
                        </div>
                    </article>
                </section>

                <section class="summary-grid">
                    <article class="card summary-card">
                        <h3>Today's Steps</h3>
                        <div class="summary-value" id="todayStepsDisplay">0</div>
                    </article>
                    <article class="card summary-card">
                        <h3>Calories Burned (Today)</h3>
                        <div class="summary-value" id="todayCaloriesDisplay">0 kcal</div>
                    </article>
                    <article class="card summary-card">
                        <h3>Weekly Total Steps</h3>
                        <div class="summary-value" id="weeklyStepsDisplay">0</div>
                    </article>
                </section>
            </div>
        </main>
    </div>

    <script src="../script.js"></script>
    <script>
        // --- LOGIC PARA SA DAILY WALK TRACKER ---
        document.addEventListener('DOMContentLoaded', () => {
            const stepInput = document.getElementById('stepInput');
            const saveStepsBtn = document.getElementById('saveStepsBtn');
            const todayStepsDisplay = document.getElementById('todayStepsDisplay');
            const todayCaloriesDisplay = document.getElementById('todayCaloriesDisplay');
            const weeklyStepsDisplay = document.getElementById('weeklyStepsDisplay');

            // Kunin ang current date key (YYYY-MM-DD)
            const getWalkDateKey = () => {
                const d = new Date();
                return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
            };

            const loadWalkData = () => {
                const walkData = JSON.parse(localStorage.getItem('walkTrackerData')) || {};
                const todayKey = getWalkDateKey();
                
                // I-display ang data ngayong araw
                const todaySteps = walkData[todayKey] || 0;
                todayStepsDisplay.textContent = todaySteps.toLocaleString();
                todayCaloriesDisplay.textContent = Math.round(todaySteps * 0.04).toLocaleString() + ' kcal';

                // I-compute ang weekly total (last 7 days)
                let weeklyTotal = 0;
                for (let i = 0; i < 7; i++) {
                    const d = new Date();
                    d.setDate(d.getDate() - i);
                    const pastKey = `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
                    weeklyTotal += walkData[pastKey] || 0;
                }
                weeklyStepsDisplay.textContent = weeklyTotal.toLocaleString();
            };

            // Pag-click ng Save Button
            saveStepsBtn.addEventListener('click', () => {
                const steps = parseInt(stepInput.value);
                if (isNaN(steps) || steps < 0) {
                    alert("Maglagay ng tamang bilang ng steps!");
                    return;
                }

                const walkData = JSON.parse(localStorage.getItem('walkTrackerData')) || {};
                const todayKey = getWalkDateKey();
                
                // I-add sa current steps kung nag-log na kanina
                walkData[todayKey] = (walkData[todayKey] || 0) + steps;
                
                localStorage.setItem('walkTrackerData', JSON.stringify(walkData));
                stepInput.value = ''; // i-clear ang input
                loadWalkData(); // I-refresh ang UI
            });

            loadWalkData(); // Load data pagka-open ng page
        });
    </script>
</body>
</html>
