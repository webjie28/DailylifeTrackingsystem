<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study &amp; Books — Daily Life Tracking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        .page-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; margin-bottom: 28px; }
        .page-header h1 { font-size: 32px; font-weight: 800; color: var(--text-primary); margin: 0; }
        .btn { padding: 10px 18px; border-radius: 12px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: var(--accent-purple); color: #fff; }
        .btn-primary:hover { background: var(--accent-purple-hover); }
        .btn-outline { background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border-color-strong); }
        .btn-outline:hover { background: var(--bg-subtle); }
        .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }

        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 20px; padding: 20px 22px; box-shadow: var(--shadow-sm); }
        .stat-label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
        .stat-value { font-size: 28px; font-weight: 800; color: var(--accent-purple); }

        .content-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 24px; margin-bottom: 28px; }
        @media (max-width: 900px) { .content-grid { grid-template-columns: 1fr; } }

        .panel { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 24px; padding: 24px; box-shadow: var(--shadow-sm); }
        .panel h3 { font-size: 18px; font-weight: 700; color: var(--text-primary); margin: 0 0 20px; }

        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
        .form-group label { font-size: 13px; font-weight: 600; color: var(--text-secondary); }
        .form-group input, .form-group select, .form-group textarea { padding: 10px 14px; border-radius: 12px; border: 1px solid var(--border-color-strong); background: var(--bg-input-inset); font-size: 14px; color: var(--text-primary); outline: none; width: 100%; font-family: inherit; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent-purple); box-shadow: 0 0 0 3px var(--accent-purple-light); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        /* Book Cards */
        .books-list { display: flex; flex-direction: column; gap: 16px; }
        .book-card { background: var(--bg-input-inset); border: 1px solid var(--border-color); border-radius: 18px; padding: 18px; position: relative; transition: all 0.2s; }
        .book-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); }
        .book-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .book-title-wrap { display: flex; align-items: center; gap: 8px; }
        .book-emoji { font-size: 20px; }
        .book-title { font-size: 15px; font-weight: 700; color: var(--text-primary); }
        .book-author { font-size: 12px; color: var(--text-muted); }
        .book-progress { font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; }
        .book-bar-wrap { height: 8px; background: var(--border-color-strong); border-radius: 999px; overflow: hidden; margin-bottom: 10px; }
        .book-bar-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--accent-purple), var(--accent-green)); transition: width 0.5s ease; }
        
        .book-footer { display: flex; justify-content: space-between; align-items: center; }
        .book-pct { font-size: 13px; font-weight: 700; color: var(--accent-purple); }
        .book-status-badge { font-size: 11px; font-weight: 700; padding: 4px 8px; border-radius: 6px; }
        .status-reading { background: var(--accent-purple-light); color: var(--accent-purple); }
        .status-completed { background: rgba(74, 222, 128, 0.15); color: var(--accent-green); }
        .status-toread { background: var(--border-color-strong); color: var(--text-secondary); }

        .book-actions { display: flex; gap: 6px; }
        .book-btn-danger { background: transparent; color: var(--accent-red); border: none; font-weight: 700; cursor: pointer; font-size: 12px; }
        .book-btn-edit { background: transparent; color: var(--accent-purple); border: none; font-weight: 700; cursor: pointer; font-size: 12px; }

        /* Pomodoro Timer */
        .pomodoro-panel { text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 280px; }
        .timer-display { font-size: 64px; font-weight: 800; color: var(--text-primary); font-variant-numeric: tabular-nums; margin: 20px 0; }
        .timer-mode { font-size: 14px; font-weight: 700; text-transform: uppercase; color: var(--accent-purple); letter-spacing: 0.1em; background: var(--accent-purple-light); padding: 6px 16px; border-radius: 20px; }
        .timer-controls { display: flex; gap: 14px; }
        .timer-btn { width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all 0.2s; }
        .btn-play { background: var(--accent-purple); color: white; }
        .btn-play:hover { background: var(--accent-purple-hover); }
        .btn-reset { background: var(--border-color-strong); color: var(--text-primary); }
        .btn-reset:hover { background: var(--bg-subtle); }

        /* Tabs */
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        .tab-btn { background: transparent; border: none; padding: 6px 12px; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-radius: 8px; }
        .tab-btn.active { background: var(--accent-purple-light); color: var(--accent-purple); }

        .empty-msg { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 14px; }
    </style>
</head>
<body>
    <button id="toggleSidebar" class="toggle-sidebar-btn">☰ Menu</button>
    <div class="app-shell">
        <div id="sidebar" class="sidebar-container"></div>
        <main class="main-content">
            <div class="container" style="padding-top: 0;">
                
                <header class="page-header">
                    <div>
                        <h1>Study &amp; Books</h1>
                        <p class="header-sub">Track your reading progress and manage focus timer session logs</p>
                    </div>
                    <button class="btn btn-primary" onclick="openBookModal()">+ Add New Book</button>
                </header>

                <!-- Stats Row -->
                <section class="stats-row">
                    <div class="stat-card">
                        <div class="stat-label">Books Finished</div>
                        <div class="stat-value" id="statFinished">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Currently Reading</div>
                        <div class="stat-value" id="statReading" style="color: var(--accent-purple);">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Total Reading Time</div>
                        <div class="stat-value" id="statTime" style="color: var(--accent-green);">0 mins</div>
                    </div>
                </section>

                <div class="content-grid">
                    <!-- Left: Books List -->
                    <div class="panel">
                        <div class="tabs">
                            <button class="tab-btn active" id="tabAll" onclick="setFilter('all')">All Books</button>
                            <button class="tab-btn" id="tabReading" onclick="setFilter('reading')">Reading</button>
                            <button class="tab-btn" id="tabCompleted" onclick="setFilter('completed')">Completed</button>
                            <button class="tab-btn" id="tabToRead" onclick="setFilter('toread')">To Read</button>
                        </div>
                        <div class="books-list" id="booksList">
                            <div class="empty-msg">No books tracked yet. Click "+ Add New Book" to start.</div>
                        </div>
                    </div>

                    <!-- Right: Pomodoro Timer -->
                    <div class="panel pomodoro-panel">
                        <div class="timer-mode" id="timerMode"> Focus Session</div>
                        <div class="timer-display" id="timerDisplay">25:00</div>
                        <div class="timer-controls">
                            <button class="timer-btn btn-reset" onclick="resetTimer()" title="Reset Session">↺</button>
                            <button class="timer-btn btn-play" id="playBtn" onclick="toggleTimer()">▶</button>
                        </div>
                        
                        <!-- Mini Notes Area for active reading -->
                        <div class="form-group" style="width: 100%; margin-top: 24px; text-align: left;">
                            <label> Study Session Notes</label>
                            <textarea id="sessionNotes" placeholder="Jot down quick thoughts during your focus timer... (saved automatically)" style="min-height: 80px;"></textarea>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- Add Book Modal -->
    <div class="modal-overlay hidden" id="bookModal">
        <div class="modal-card">
            <button class="modal-close" onclick="closeBookModal()">×</button>
            <div class="modal-header">
                <h3 id="modalTitle">Add New Book</h3>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Book Title</label>
                    <input type="text" id="bookTitle" placeholder="e.g. Atomic Habits" />
                </div>
                <div class="form-group">
                    <label>Author</label>
                    <input type="text" id="bookAuthor" placeholder="e.g. James Clear" />
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Current Page</label>
                        <input type="number" id="bookCurrentPage" min="0" value="0" />
                    </div>
                    <div class="form-group">
                        <label>Total Pages</label>
                        <input type="number" id="bookTotalPages" min="1" value="300" />
                    </div>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="bookStatus">
                        <option value="reading">Currently Reading</option>
                        <option value="completed">Completed</option>
                        <option value="toread">To Read</option>
                    </select>
                </div>
                <button class="btn btn-primary" style="width: 100%; margin-top: 10px;" onclick="saveBook()">Save Book</button>
            </div>
        </div>
    </div>

    <script src="../script.js"></script>
    <script>
        const STORAGE_KEY = 'studyBooksList';
        const NOTES_KEY = 'studySessionNotes';
        const TIME_KEY = 'studyTotalTime';
        let books = [];
        let currentFilter = 'all';
        let activeBookId = null;

        // Pomodoro State
        let timer = null;
        let isRunning = false;
        let timeRemaining = 1500; // 25 minutes
        let isBreak = false;

        function loadData() {
            try {
                books = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            } catch {
                books = [];
            }
            document.getElementById('sessionNotes').value = localStorage.getItem(NOTES_KEY) || '';
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(books));
            updateStats();
        }

        function updateStats() {
            const finished = books.filter(b => b.status === 'completed').length;
            const reading = books.filter(b => b.status === 'reading').length;
            const totalMinutes = parseInt(localStorage.getItem(TIME_KEY)) || 0;
            
            document.getElementById('statFinished').textContent = finished;
            document.getElementById('statReading').textContent = reading;
            document.getElementById('statTime').textContent = `${totalMinutes} mins`;
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if(filter === 'all') document.getElementById('tabAll').classList.add('active');
            if(filter === 'reading') document.getElementById('tabReading').classList.add('active');
            if(filter === 'completed') document.getElementById('tabCompleted').classList.add('active');
            if(filter === 'toread') document.getElementById('tabToRead').classList.add('active');
            renderBooks();
        }

        function renderBooks() {
            const listEl = document.getElementById('booksList');
            let filtered = books;
            if (currentFilter !== 'all') {
                filtered = books.filter(b => b.status === currentFilter);
            }

            if (filtered.length === 0) {
                listEl.innerHTML = `<div class="empty-msg">No ${currentFilter !== 'all' ? currentFilter.replace('toread', 'To Read') : ''} books found.</div>`;
                return;
            }

            listEl.innerHTML = filtered.map(b => {
                const total = parseInt(b.totalPages) || 1;
                const curr = parseInt(b.currentPage) || 0;
                const pct = Math.min(100, Math.round((curr / total) * 100));

                let badgeText = 'To Read';
                let badgeClass = 'status-toread';
                if(b.status === 'reading') { badgeText = 'Reading'; badgeClass = 'status-reading'; }
                if(b.status === 'completed') { badgeText = 'Completed'; badgeClass = 'status-completed'; }

                return `
                    <div class="book-card">
                        <div class="book-top">
                            <div class="book-title-wrap">
                                <span class="book-emoji">${b.emoji || ''}</span>
                                <div>
                                    <div class="book-title">${b.title}</div>
                                    <div class="book-author">${b.author}</div>
                                </div>
                            </div>
                            <span class="book-status-badge ${badgeClass}">${badgeText}</span>
                        </div>
                        <div class="book-progress">
                            Page ${curr} of ${total}
                        </div>
                        <div class="book-bar-wrap">
                            <div class="book-bar-fill" style="width: ${pct}%"></div>
                        </div>
                        <div class="book-footer">
                            <span class="book-pct">${pct}% Completed</span>
                            <div class="book-actions">
                                <button class="book-btn-edit" onclick="editBook('${b.id}')">️ Edit</button>
                                <button class="book-btn-danger" onclick="deleteBook('${b.id}')">️ Delete</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openBookModal() {
            activeBookId = null;
            document.getElementById('modalTitle').textContent = 'Add New Book';
            document.getElementById('bookTitle').value = '';
            document.getElementById('bookAuthor').value = '';
            document.getElementById('bookCurrentPage').value = 0;
            document.getElementById('bookTotalPages').value = 300;
            document.getElementById('bookStatus').value = 'reading';
            document.getElementById('bookModal').classList.remove('hidden');
        }

        function closeBookModal() {
            document.getElementById('bookModal').classList.add('hidden');
        }

        function editBook(id) {
            const b = books.find(book => book.id === id);
            if (!b) return;
            activeBookId = id;
            document.getElementById('modalTitle').textContent = 'Edit Book';
            document.getElementById('bookTitle').value = b.title;
            document.getElementById('bookAuthor').value = b.author;
            document.getElementById('bookCurrentPage').value = b.currentPage;
            document.getElementById('bookTotalPages').value = b.totalPages;
            document.getElementById('bookStatus').value = b.status;
            document.getElementById('bookModal').classList.remove('hidden');
        }

        function saveBook() {
            const title = document.getElementById('bookTitle').value.trim();
            const author = document.getElementById('bookAuthor').value.trim() || 'Unknown';
            const curr = parseInt(document.getElementById('bookCurrentPage').value) || 0;
            const total = parseInt(document.getElementById('bookTotalPages').value) || 1;
            const status = document.getElementById('bookStatus').value;
            const emoji = '';

            if (!title) { alert('Please enter a book title.'); return; }

            if (activeBookId) {
                // Edit mode
                books = books.map(b => b.id === activeBookId ? { ...b, title, author, currentPage: curr, totalPages: total, status, emoji } : b);
            } else {
                // Add mode
                books.push({
                    id: Date.now().toString(),
                    title,
                    author,
                    currentPage: curr,
                    totalPages: total,
                    status,
                    emoji
                });
            }

            saveData();
            closeBookModal();
            renderBooks();
        }

        function deleteBook(id) {
            if(!confirm('Are you sure you want to remove this book?')) return;
            books = books.filter(b => b.id !== id);
            saveData();
            renderBooks();
        }

        // Timer Logic
        function updateTimerDisplay() {
            const mins = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
            const secs = (timeRemaining % 60).toString().padStart(2, '0');
            document.getElementById('timerDisplay').textContent = `${mins}:${secs}`;
        }

        function toggleTimer() {
            if (isRunning) {
                clearInterval(timer);
                document.getElementById('playBtn').textContent = '▶';
                isRunning = false;
            } else {
                document.getElementById('playBtn').textContent = '⏸';
                isRunning = true;
                timer = setInterval(() => {
                    if (timeRemaining > 0) {
                        timeRemaining--;
                        updateTimerDisplay();
                    } else {
                        // Timer sound (beep)
                        try {
                            const synth = window.speechSynthesis;
                            if (synth) {
                                const utterance = new SpeechSynthesisUtterance(isBreak ? "Break is over, time to focus!" : "Focus session complete, time for a break!");
                                synth.speak(utterance);
                            }
                        } catch(e) {}
                        
                        if (!isBreak) {
                            // Record reading time
                            const totalTime = parseInt(localStorage.getItem(TIME_KEY)) || 0;
                            localStorage.setItem(TIME_KEY, totalTime + 25);
                            updateStats();

                            isBreak = true;
                            timeRemaining = 300; // 5 minutes break
                            document.getElementById('timerMode').textContent = ' Break Time';
                            document.getElementById('timerMode').style.background = 'rgba(74, 222, 128, 0.15)';
                            document.getElementById('timerMode').style.color = 'var(--accent-green)';
                        } else {
                            isBreak = false;
                            timeRemaining = 1500; // 25 minutes focus
                            document.getElementById('timerMode').textContent = ' Focus Session';
                            document.getElementById('timerMode').style.background = 'var(--accent-purple-light)';
                            document.getElementById('timerMode').style.color = 'var(--accent-purple)';
                        }
                        updateTimerDisplay();
                    }
                }, 1000);
            }
        }

        function resetTimer() {
            clearInterval(timer);
            isRunning = false;
            isBreak = false;
            timeRemaining = 1500;
            document.getElementById('playBtn').textContent = '▶';
            document.getElementById('timerMode').textContent = ' Focus Session';
            document.getElementById('timerMode').style.background = 'var(--accent-purple-light)';
            document.getElementById('timerMode').style.color = 'var(--accent-purple)';
            updateTimerDisplay();
        }

        // Init
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            updateStats();
            renderBooks();

            // Setup study notes auto-save
            const sessionNotes = document.getElementById('sessionNotes');
            sessionNotes.addEventListener('input', () => {
                localStorage.setItem(NOTES_KEY, sessionNotes.value);
            });
        });
    </script>
</body>
</html>
