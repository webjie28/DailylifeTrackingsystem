<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daily Life Tracking System</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

    <header>

        <h1> Daily Life Tracking System</h1>

        <p id="today"></p>

    </header>

    <div class="dashboard">

        <div class="card">

            <h2> Streak</h2>

            <div class="big-number" id="streak">
                0
            </div>

        </div>

        <div class="card">

            <h2> Study English</h2>

            <div class="big-number" id="englishProgress">
                0%
            </div>

        </div>

        <div class="card">

            <h2> Study Coding</h2>

            <div class="big-number" id="codingProgress">
                0%
            </div>

        </div>

        <div class="card">

            <h2> Gym Progress</h2>

            <div class="big-number" id="gymProgress">
                0%
            </div>

        </div>

        <div class="card">

            <h2> Calories Burned</h2>

            <div class="big-number" id="caloriesBurned">
                0 kcal
            </div>

        </div>

        <div class="card">

            <h2> Overall Progress</h2>

            <div class="big-number" id="progress">
                0%
            </div>

        </div>

    </div>

    <div class="section">

        <div class="section-header">
            <h2>Manage Tasks</h2>
            <div class="task-filter">
                <select id="viewCategory" aria-label="Filter tasks by category">
                    <option value="">View all categories</option>
                </select>
            </div>
        </div>

        <div class="task-actions">
            <div class="task-block">
                <div class="action-header">New Category</div>
                <div class="add-category">
                    <input id="newCategoryName" type="text" placeholder="New category name" />
                    <input id="newCategoryDuration" type="number" placeholder="Hours" min="1" max="12" />
                    <button id="addCategoryButton">Add Category</button>
                </div>
            </div>

            <div class="task-block">
                <div class="action-header">Add Task Today
                </div>
                <div class="task-input">
                    <select id="taskCategory" aria-label="Choose task category">
                        <option value="english">Study English</option>
                        <option value="coding">Study Coding</option>
                        <option value="gym">Gym Routine</option>
                    </select>
                    <input id="newTaskInput" type="text" placeholder="Add a new task">
                    <input id="newTaskCalories" type="number" placeholder="Calories burned" min="0" style="display:none;" />
                    <button id="addTaskButton">Add</button>
                </div>
            </div>
        </div>

        <div class="task-groups" id="taskGroups"></div>

    </div>


</div>

<script src="script.js"></script>

</body>
</html>
