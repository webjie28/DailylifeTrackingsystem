<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Life Tracking System — Home</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

        <main class="main-content">

                <div class="quick-actions">
                    <a class="btn" href="dashboard.html">Go to Dashboard</a>

                </div>
            </section>

            <section class="overview-grid">
                <article class="card">
                    <h3>Overview</h3>
                    <p>Personalized summary and recent activity will appear here.</p>
                </article>
                <article class="card">

                    <p>Use the sidebar to switch between modules quickly.</p>
                </article>

    <script src="script.js"></script>
