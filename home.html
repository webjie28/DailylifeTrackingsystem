<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Life Tracking System — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
    /* Splash Screen Overlay */
    .splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #0c0e14; /* Deep premium dark background */
        z-index: 10000;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.5s ease, visibility 0.5s ease;
        opacity: 1;
        visibility: visible;
    }

    .splash-screen.fade-out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
    }

    .splash-content {
        text-align: center;
        animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .splash-title {
        font-family: 'Inter', sans-serif !important; /* Maintain Inter for branding */
        font-size: 52px;
        font-weight: 800 !important;
        letter-spacing: 0.18em;
        margin-bottom: 12px;
        background: linear-gradient(135deg, #a78bfa 0%, #ec4899 50%, #3b82f6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-transform: uppercase;
        display: block;
    }

    .splash-subtitle {
        font-family: 'Inter', sans-serif !important;
        font-size: 13px;
        font-weight: 500 !important;
        color: #94a3b8;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        margin-bottom: 40px;
    }

    .splash-loader {
        width: 240px;
        height: 4px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 999px;
        margin: 0 auto;
        overflow: hidden;
        position: relative;
    }

    .splash-loader-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #a78bfa 0%, #ec4899 50%, #3b82f6 100%);
        border-radius: 999px;
        animation: loadBar 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes loadBar {
        0% { width: 0%; }
        50% { width: 60%; }
        100% { width: 100%; }
    }

    /* Clean Pastel Stats styling inspired by NeuroNest */
    .stats-pastel-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        margin-bottom: 24px;
    }
    .stat-pastel-card {
        border-radius: 24px;
        padding: 24px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        height: 172px;
        transition: transform 0.2s, box-shadow 0.2s;
        text-decoration: none;
        position: relative;
        overflow: hidden;
    }
    .stat-pastel-card:hover {
        transform: translateY(-3px);
    }
    .stat-pastel-value {
        font-size: 30px;
        font-weight: 800;
        line-height: 1.1;
        margin-bottom: 4px;
    }
    .stat-pastel-label {
        font-size: 13px;
        font-weight: 600;
        opacity: 0.7;
    }

    /* Solid Pastel colors for light and dark themes */
    .stat-pastel-green {
        background: #dcfce7 !important;
        border: 1px solid #bbf7d0 !important;
        color: #14532d !important;
        box-shadow: 0 4px 20px rgba(22, 101, 52, 0.04);
    }
    [data-theme="dark"] .stat-pastel-green {
        background: #14532d !important;
        border: 1px solid #166534 !important;
        color: #dcfce7 !important;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.25);
    }

    .stat-pastel-blue {
        background: #e0f2fe !important;
        border: 1px solid #bae6fd !important;
        color: #0c4a6e !important;
        box-shadow: 0 4px 20px rgba(3, 105, 161, 0.04);
    }
    [data-theme="dark"] .stat-pastel-blue {
        background: #0c4a6e !important;
        border: 1px solid #0369a1 !important;
        color: #e0f2fe !important;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.25);
    }

    .stat-pastel-yellow {
        background: #fef9c3 !important;
        border: 1px solid #fef08a !important;
        color: #713f12 !important;
        box-shadow: 0 4px 20px rgba(133, 77, 14, 0.04);
    }
    [data-theme="dark"] .stat-pastel-yellow {
        background: #713f12 !important;
        border: 1px solid #854d0e !important;
        color: #fef9c3 !important;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.25);
    }

    .stat-pastel-purple {
        background: #f3e8ff !important;
        border: 1px solid #e9d5ff !important;
        color: #581c87 !important;
        box-shadow: 0 4px 20px rgba(107, 33, 168, 0.04);
    }
    [data-theme="dark"] .stat-pastel-purple {
        background: #581c87 !important;
        border: 1px solid #6b21a8 !important;
        color: #f3e8ff !important;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.25);
    }

    .stat-pastel-icon-wrapper {
        margin-bottom: 8px;
        display: flex;
        align-items: center;
    }

    /* Tabbed Chart Styling — Solid theme colors */
    .chart-card-tabbed {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 20px;
        padding: 24px;
        box-shadow: var(--shadow-md);
        display: flex;
        flex-direction: column;
        gap: 20px;
        width: 100%;
    }

    .chart-tab-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 16px;
    }
    .chart-tab-header h3 {
        font-size: 18px;
        font-weight: 700;
        color: var(--text-primary);
    }
    .chart-tabs {
        display: flex;
        gap: 4px;
        background: var(--bg-subtle);
        padding: 4px;
        border-radius: 12px;
    }
    .chart-tab-btn {
        background: transparent;
        border: none;
        padding: 6px 12px;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-secondary);
        cursor: pointer;
        border-radius: 8px;
        transition: all 0.2s ease;
    }
    .chart-tab-btn:hover { color: var(--text-primary); }
    .chart-tab-btn.active {
        background: var(--card-bg);
        color: var(--text-primary);
        box-shadow: var(--shadow-sm);
    }
    .chart-wrapper { position: relative; height: 320px; width: 100%; }
    .chart-wrapper.hidden { display: none !important; }

    /* Action buttons — Solid theme styling */
    .actions-minimal-row { display: flex; gap: 12px; margin-bottom: 32px; }
    .action-minimal-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px 24px;
        background: var(--bg-subtle);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        color: var(--text-primary);
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.2s ease;
    }
    .action-minimal-btn:hover {
        background: var(--bg-hover);
        border-color: var(--accent-purple);
        transform: translateY(-2px);
    }

    /* Focus Card — Solid theme styling */
    .focus-minimal-card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 20px;
        padding: 24px;
        box-shadow: var(--shadow-sm);
        margin-bottom: 24px;
    }
    .focus-minimal-card .focus-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
    }
    .focus-minimal-card h3 {
        font-size: 14px;
        font-weight: 700;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }
    .focus-minimal-input {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid var(--border-color);
        border-radius: 12px;
        background: var(--bg-subtle);
        color: var(--text-primary);
        font-family: inherit;
        font-size: 14px;
        font-weight: 500;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
    }
    .focus-minimal-input:focus {
        border-color: var(--accent-purple);
        box-shadow: 0 0 0 3px var(--accent-purple-light);
        background: var(--card-bg);
    }

    /* ── Professional Dashboard Header ─────────────────────── */
    .dash-header {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px 0 24px;
        border-bottom: 1px solid var(--border-color);
        margin-bottom: 32px;
        width: 100%;
    }
    .dash-greeting {
        font-size: 38px;
        font-weight: 800;
        color: var(--text-primary);
        margin: 0 0 8px;
        letter-spacing: -0.025em;
    }
    .dash-date-sub {
        font-size: 15px;
        color: var(--text-secondary);
        font-weight: 600;
        margin: 0;
        letter-spacing: 0.08em;
        text-transform: uppercase;
    }
    @media (max-width: 600px) {
        .dash-header {
            padding: 28px 0 20px;
            margin-bottom: 24px;
        }
        .dash-greeting {
            font-size: 28px;
        }
        .dash-date-sub {
            font-size: 13px;
        }
    }
</style>
</head>
<body>
    <!-- Splash Screen Overlay -->
    <div id="splashScreen" class="splash-screen">
        <div class="splash-content">
            <h1 class="splash-title">DLT</h1>
            <p class="splash-subtitle">Daily Life Tracker</p>
            <div class="splash-loader">
                <div class="splash-loader-bar"></div>
            </div>
        </div>
    </div>

    <button id="toggleSidebar" class="toggle-sidebar-btn">☰ Menu</button>

    <div class="app-shell">
        <!-- Sidebar container starts collapsed on Home page -->
        <div id="sidebar" class="sidebar-container collapsed"></div>

        <main class="main-content">
            <!-- Dashboard Header -->
            <header class="dash-header animate-in" style="animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;">
                <h1 class="dash-greeting" id="dashGreeting">Good evening, Benjie!</h1>
                <p class="dash-date-sub">
                    <span id="dashDayLabel">Wednesday</span>, <span id="dashDateMain">June 24, 2026</span>
                </p>
            </header>

            <!-- Today's Focus Card -->
            <section class="animate-in" style="animation: slideInLeft 0.5s ease both; animation-delay: 0.1s;">
                <article class="focus-minimal-card">
                    <div class="focus-header">
                        <h3>Today's Focus</h3>
                    </div>
                    <input type="text" id="todayFocusInput" class="focus-minimal-input" placeholder="What is your #1 priority today?" />
                </article>
            </section>

            <!-- Quick Stats Section (Pastel Colored Cards) -->
            <section class="animate-in">
                <div class="stats-pastel-grid">
                    <a href="pages/fitness.html" class="stat-pastel-card stat-pastel-green" style="animation: slideInLeft 0.5s ease both; animation-delay: 0.2s;">
                        <div class="stat-pastel-icon-wrapper">
                            <svg viewBox="0 0 24 24" width="46" height="46" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 6.5c.8 0 1.5.3 2.1.8a5 5 0 0 1 3.5.2c.4 1.5.1 3-.8 4.2a3.5 3.5 0 0 0 0 3.6c.9 1.2 1.2 2.7.8 4.2a5 5 0 0 1-3.5.2c-.6.5-1.3.8-2.1.8-.7 0-1.3-.2-1.8-.6-.5.4-1.1.6-1.8.6a4.8 4.8 0 0 1-4.2-2.5C3.3 16 3 13.8 3.5 11.7A4.8 4.8 0 0 1 7.7 8.1c.5-.4 1.1-.6 1.8-.6.5 0 1.1.2 1.6.6.4-.4 1-.6 1.6-.6z" />
                                <path d="M12 6.5c.5-2 1.5-3 3-3.5" />
                                <path d="M15 3c1.5-1 2.5-1 2.5-1s-.2 1.5-1.8 2.5C14.7 5.2 14.5 4.5 15 3z" />
                            </svg>
                        </div>
                        <div class="stat-pastel-info">
                            <div class="stat-pastel-value" id="summaryTotalCaloriesToday">0 kcal</div>
                            <div class="stat-pastel-label">Calories Today</div>
                        </div>
                    </a>
                    <a href="pages/fitness.html" class="stat-pastel-card stat-pastel-blue" style="animation: slideInLeft 0.5s ease both; animation-delay: 0.3s;">
                        <div class="stat-pastel-icon-wrapper">
                            <svg viewBox="0 0 24 24" width="46" height="46" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M4 16v-2.38C4 11.5 5.88 9.85 6 7.07l.08-1.94c.02-.45.33-.84.77-.92.8-.14 1.46.22 1.93.94l.84 1.3c.3.45.32 1.03.07 1.5L8.75 11c-.38.7-.75 1.5-.75 2.5v2.5" />
                                <path d="M16 16v-2.38c0-2.12-1.88-3.77-2-6.55l-.08-1.94c-.02-.45-.33-.84-.77-.92-.8-.14-1.46.22-1.93.94l-.84 1.3c-.3.45-.32 1.03-.07 1.5l.93 3.08c.38.7.75 1.5.75 2.5v2.5" />
                            </svg>
                        </div>
                        <div class="stat-pastel-info">
                            <div class="stat-pastel-value" id="summaryTodaySteps">0 steps</div>
                            <div class="stat-pastel-label">Steps Today</div>
                        </div>
                    </a>
                    <a href="pages/finance.html" class="stat-pastel-card stat-pastel-yellow" style="animation: slideInLeft 0.5s ease both; animation-delay: 0.4s;">
                        <div class="stat-pastel-icon-wrapper">
                            <svg viewBox="0 0 24 24" width="46" height="46" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="9" width="18" height="11" rx="2.5" />
                                <path d="M16 14h5v-3h-5v3z" />
                                <circle cx="18.5" cy="12.5" r="0.8" fill="currentColor" />
                                <circle cx="10" cy="5.5" r="1.5" />
                                <circle cx="14" cy="4.5" r="1.5" />
                            </svg>
                        </div>
                        <div class="stat-pastel-info">
                            <div class="stat-pastel-value" id="summaryMonthlyExpenses">₱0</div>
                            <div class="stat-pastel-label">Expenses (Month)</div>
                        </div>
                    </a>
                    <a href="pages/saving.html" class="stat-pastel-card stat-pastel-purple" style="animation: slideInLeft 0.5s ease both; animation-delay: 0.5s;">
                        <div class="stat-pastel-icon-wrapper">
                            <svg viewBox="0 0 24 24" width="46" height="46" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M3 12c0-3 2.7-5.5 5.5-5.5h3.5c3 0 5.5 2.5 5.5 5.5a5.4 5.4 0 0 1-2 4.2l.6 2.2c0 .3-.3.6-.6.6H13a5.4 5.4 0 0 1-3-.9l-2.1 1.1c-.3.2-.6 0-.6-.3l.6-2.1A5.4 5.4 0 0 1 3 12z" />
                                <path d="M1 11a1 1 0 0 1 1-1h2v3H2a1 1 0 0 1-1-1v-1z" />
                                <circle cx="8" cy="10" r="0.8" fill="currentColor" />
                                <path d="M13 6l1.5-2.5a.5.5 0 0 1 .9 0L17 6" />
                                <path d="M16.5 18v3M11.5 18v3" />
                                <circle cx="14" cy="2" r="1.5" />
                                <path d="M14 3.5v1.5" />
                            </svg>
                        </div>
                        <div class="stat-pastel-info">
                            <div class="stat-pastel-value" id="summaryTotalSavings">₱0</div>
                            <div class="stat-pastel-label">Total Savings</div>
                        </div>

                    </a>
                </div>
            </section>

            <!-- Quick Actions Card -->
            <section class="animate-in" style="animation: slideInLeft 0.5s ease both; animation-delay: 0.6s;">
                <div class="actions-minimal-row">
                    <a href="pages/finance.html" class="action-minimal-btn">
                        Log Expense
                    </a>
                    <a href="pages/fitness.html" class="action-minimal-btn">
                        Log Workout
                    </a>
                </div>
            </section>

            <!-- Bottom: Analytics & Trends (Tabbed Chart, full width) -->
            <section class="animate-in" style="margin-bottom: 36px; animation: fadeInUp 0.6s ease both; animation-delay: 0.7s;">
                <article class="chart-card-tabbed">
                    <div class="chart-tab-header">
                        <h3 id="activeChartTitle">Savings Growth</h3>
                        <div class="chart-tabs">
                            <button class="chart-tab-btn active" data-chart="growth">Savings</button>
                            <button class="chart-tab-btn" data-chart="expenses">Expenses</button>
                            <button class="chart-tab-btn" data-chart="loans">Goals</button>
                            <button class="chart-tab-btn" data-chart="calories">Calories</button>
                        </div>
                    </div>
                    <div class="chart-container">
                        <div class="chart-wrapper" id="wrapper-growth">
                            <canvas id="growthChart"></canvas>
                        </div>
                        <div class="chart-wrapper hidden" id="wrapper-expenses">
                            <canvas id="expensesChart"></canvas>
                        </div>
                        <div class="chart-wrapper hidden" id="wrapper-loans">
                            <canvas id="loanPayoffChart"></canvas>
                        </div>
                        <div class="chart-wrapper hidden" id="wrapper-calories">
                            <canvas id="caloriesChart"></canvas>
                        </div>
                    </div>
                </article>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
    // Home page greeting and dynamic rendering logic
    (function() {
        // Splash screen fadeout logic
        const splash = document.getElementById('splashScreen');
        if (splash) {
            setTimeout(() => {
                splash.classList.add('fade-out');
                setTimeout(() => {
                    splash.remove();
                }, 500);
            }, 2000);
        }

        // ── Dashboard Header Clock ────────────────────────────
        const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        const PERIODS = {
            night:     'Late Night',
            dawn:      'Dawn',
            morning:   'Morning',
            afternoon: 'Afternoon',
            evening:   'Evening',
        };
        const GREETINGS = {
            night:     'Good night, Benjie!',
            dawn:      'Good morning, Benjie!',
            morning:   'Good morning, Benjie!',
            afternoon: 'Good afternoon, Benjie!',
            evening:   'Good evening, Benjie!',
        };

        function getTimePeriodLabel(h) {
            if (h < 5)  return 'night';
            if (h < 8)  return 'dawn';
            if (h < 12) return 'morning';
            if (h < 18) return 'afternoon';
            if (h < 21) return 'evening';
            return 'night';
        }

        function updateDashHeader() {
            const now   = new Date();
            const day   = document.getElementById('dashDayLabel');
            const date  = document.getElementById('dashDateMain');
            const greet = document.getElementById('dashGreeting');

            const period = getTimePeriodLabel(now.getHours());

            if (day)   day.textContent   = DAYS[now.getDay()];
            if (date)  date.textContent  = `${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
            if (greet) greet.textContent  = GREETINGS[period];
        }

        updateDashHeader();
        setInterval(updateDashHeader, 30000);
        // ─────────────────────────────────────────────────────

        // Today's Focus persistence
        const focusInput = document.getElementById('todayFocusInput');
        if (focusInput) {
            const saved = localStorage.getItem('todayFocus');
            if (saved) focusInput.value = saved;
            focusInput.addEventListener('input', () => {
                localStorage.setItem('todayFocus', focusInput.value);
            });
        }
        
        // Dynamic summary metrics
        if(typeof updateSummaryCards === 'function') updateSummaryCards();

        // Chart tab switching logic
        const tabBtns = document.querySelectorAll('.chart-tab-btn');
        const wrappers = {
            growth: document.getElementById('wrapper-growth'),
            expenses: document.getElementById('wrapper-expenses'),
            loans: document.getElementById('wrapper-loans'),
            calories: document.getElementById('wrapper-calories')
        };
        const titles = {
            growth: 'Savings Growth',
            expenses: 'Expenses by Category',
            loans: 'Savings Goals Progress',
            calories: 'Calories Burned (Total)'
        };
        const titleEl = document.getElementById('activeChartTitle');

        function triggerChartRender(chartName) {
            if (typeof Chart === 'undefined') return;
            
            if (chartName === 'growth' && typeof creategrowthChart === 'function') {
                const canvas = document.getElementById('growthChart');
                if (canvas) {
                    const existing = Chart.getChart(canvas);
                    if (existing) existing.destroy();
                    creategrowthChart();
                }
            } else if (chartName === 'expenses' && typeof createExpensesChart === 'function') {
                const canvas = document.getElementById('expensesChart');
                if (canvas) {
                    const existing = Chart.getChart(canvas);
                    if (existing) existing.destroy();
                    createExpensesChart();
                }
            } else if (chartName === 'loans' && typeof createLoanPayoffChart === 'function') {
                const canvas = document.getElementById('loanPayoffChart');
                if (canvas) {
                    const existing = Chart.getChart(canvas);
                    if (existing) existing.destroy();
                    createLoanPayoffChart();
                }
            } else if (chartName === 'calories' && typeof renderCaloriesChart === 'function') {
                const canvas = document.getElementById('caloriesChart');
                if (canvas) {
                    const existing = Chart.getChart(canvas);
                    if (existing) existing.destroy();
                    renderCaloriesChart();
                }
            }
        }

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const targetChart = btn.getAttribute('data-chart');
                
                // Update active button state
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                // Update active title
                if (titleEl && titles[targetChart]) {
                    titleEl.textContent = titles[targetChart];
                }

                // Show/hide wrappers
                Object.keys(wrappers).forEach(key => {
                    if (wrappers[key]) {
                        if (key === targetChart) {
                            wrappers[key].classList.remove('hidden');
                        } else {
                            wrappers[key].classList.add('hidden');
                        }
                    }
                });

                // Trigger chart rendering
                triggerChartRender(targetChart);
            });
        });

        // Initialize default active chart (growth) on window load
        window.addEventListener('load', () => {
            triggerChartRender('growth');
        });
    })();
    </script>
</body>
</html>
