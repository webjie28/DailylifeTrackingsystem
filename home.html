<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Life Tracking System — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
    /* Splash Screen Overlay */
    .splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #0c0e14; /* Deep premium dark background */
        z-index: 10000;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.5s ease, visibility 0.5s ease;
        opacity: 1;
        visibility: visible;
    }

    .splash-screen.fade-out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
    }

    .splash-content {
        text-align: center;
        animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .splash-title {
        font-family: 'Inter', sans-serif !important; /* Maintain Inter for branding */
        font-size: 52px;
        font-weight: 800 !important;
        letter-spacing: 0.18em;
        margin-bottom: 12px;
        background: linear-gradient(135deg, #a78bfa 0%, #ec4899 50%, #3b82f6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-transform: uppercase;
        display: block;
    }

    .splash-subtitle {
        font-family: 'Inter', sans-serif !important;
        font-size: 13px;
        font-weight: 500 !important;
        color: #94a3b8;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        margin-bottom: 40px;
    }

    .splash-loader {
        width: 240px;
        height: 4px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 999px;
        margin: 0 auto;
        overflow: hidden;
        position: relative;
    }

    .splash-loader-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #a78bfa 0%, #ec4899 50%, #3b82f6 100%);
        border-radius: 999px;
        animation: loadBar 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes loadBar {
        0% { width: 0%; }
        50% { width: 60%; }
        100% { width: 100%; }
    }

    /* ── Stat Cards: Glassmorphism ─────────────────────────── */
    .stats-pastel-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        margin-bottom: 24px;
    }
    .stat-pastel-card {
        font-family: 'Plus Jakarta Sans', sans-serif !important;
        border-radius: 24px;
        padding: 24px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        height: 172px;
        transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
        text-decoration: none;
        position: relative;
        overflow: hidden;
        background: var(--glass-bg, rgba(255,255,255,0.15)) !important;
        backdrop-filter: blur(20px) saturate(180%) !important;
        -webkit-backdrop-filter: blur(20px) saturate(180%) !important;
        border: 1px solid var(--glass-border, rgba(255,255,255,0.2)) !important;
        color: var(--time-text, var(--text-primary)) !important;
        box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    }
    .stat-pastel-card:hover {
        transform: translateY(-4px);
        background: var(--glass-hover, rgba(255,255,255,0.22)) !important;
        box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    }
    .stat-pastel-value {
        font-family: 'Plus Jakarta Sans', sans-serif !important;
        font-size: 32px;
        font-weight: 800;
        line-height: 1.1;
        margin-bottom: 4px;
        color: var(--time-text, var(--text-primary));
    }
    .stat-pastel-label {
        font-family: 'Plus Jakarta Sans', sans-serif !important;
        font-size: 13px;
        font-weight: 600;
        color: var(--time-text-muted, var(--text-secondary));
    }
    .stat-pastel-icon-wrapper {
        margin-bottom: 8px;
        display: flex;
        align-items: center;
    }

    /* ── Tabbed Chart Card: Glassmorphism ──────────────────── */
    .chart-card-tabbed {
        background: var(--glass-bg, rgba(255,255,255,0.18)) !important;
        backdrop-filter: blur(20px) saturate(180%) !important;
        -webkit-backdrop-filter: blur(20px) saturate(180%) !important;
        border: 1px solid var(--glass-border, rgba(255,255,255,0.2)) !important;
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.08);
        display: flex;
        flex-direction: column;
        gap: 20px;
        width: 100%;
    }

    .chart-tab-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
        border-bottom: 1px solid var(--glass-border, rgba(255,255,255,0.15));
        padding-bottom: 16px;
    }
    .chart-tab-header h3 {
        font-family: 'Plus Jakarta Sans', sans-serif !important;
        font-size: 18px;
        font-weight: 700;
        color: var(--time-text, var(--text-primary));
    }
    .chart-tabs {
        display: flex;
        gap: 4px;
        background: var(--glass-bg, rgba(255,255,255,0.1));
        padding: 4px;
        border-radius: 12px;
    }
    .chart-tab-btn {
        font-family: 'Plus Jakarta Sans', sans-serif !important;
        background: transparent;
        border: none;
        padding: 6px 12px;
        font-size: 13px;
        font-weight: 600;
        color: var(--time-text-muted, var(--text-secondary));
        cursor: pointer;
        border-radius: 8px;
        transition: all 0.2s ease;
    }
    .chart-tab-btn:hover { color: var(--time-text, var(--text-primary)); }
    .chart-tab-btn.active {
        background: var(--glass-hover, rgba(255,255,255,0.2));
        color: var(--time-text, var(--text-primary));
        box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .chart-wrapper { position: relative; height: 320px; width: 100%; }
    .chart-wrapper.hidden { display: none !important; }

    /* ── Action Buttons: Glassmorphism ─────────────────────── */
    .actions-minimal-row { display: flex; gap: 12px; margin-bottom: 32px; }
    .action-minimal-btn {
        font-family: 'Plus Jakarta Sans', sans-serif !important;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px 24px;
        background: var(--glass-bg, rgba(255,255,255,0.15)) !important;
        backdrop-filter: blur(16px) saturate(180%) !important;
        -webkit-backdrop-filter: blur(16px) saturate(180%) !important;
        border: 1px solid var(--glass-border, rgba(255,255,255,0.2)) !important;
        border-radius: 12px;
        color: var(--time-text, var(--text-primary)) !important;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.25s ease;
    }
    .action-minimal-btn:hover {
        background: var(--glass-hover, rgba(255,255,255,0.25)) !important;
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    }

    /* ── Focus Card: Glassmorphism ─────────────────────────── */
    .focus-minimal-card {
        background: var(--glass-bg, rgba(255,255,255,0.15)) !important;
        backdrop-filter: blur(20px) saturate(180%) !important;
        -webkit-backdrop-filter: blur(20px) saturate(180%) !important;
        border: 1px solid var(--glass-border, rgba(255,255,255,0.2)) !important;
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.08);
        margin-bottom: 24px;
    }
    .focus-minimal-card .focus-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
    }
    .focus-minimal-card h3 {
        font-family: 'Plus Jakarta Sans', sans-serif !important;
        font-size: 14px;
        font-weight: 700;
        color: var(--time-text-muted, var(--text-secondary));
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }
    .focus-minimal-input {
        font-family: 'Plus Jakarta Sans', sans-serif !important;
        width: 100%;
        padding: 12px 16px;
        border: 1px solid var(--glass-border, rgba(255,255,255,0.2));
        border-radius: 12px;
        background: var(--glass-bg, rgba(255,255,255,0.1));
        color: var(--time-text, var(--text-primary));
        font-size: 14px;
        font-weight: 500;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .focus-minimal-input::placeholder {
        color: var(--time-text-muted, var(--text-secondary));
        opacity: 0.7;
    }
    .focus-minimal-input:focus {
        border-color: var(--time-accent, var(--accent-purple));
        box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.15);
        background: var(--glass-hover, rgba(255,255,255,0.2));
    }

    /* ── Dashboard Header: Split Layout with Clock ─────────── */
    .dash-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        padding: 40px 0 28px;
        border-bottom: 1px solid var(--glass-border, rgba(255,255,255,0.15));
        margin-bottom: 32px;
        width: 100%;
    }
    .dash-header-left {
        display: flex;
        flex-direction: column;
        gap: 2px;
    }
    .dash-day-label {
        font-family: 'Plus Jakarta Sans', sans-serif !important;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--time-accent, var(--accent-purple));
    }
    .dash-date-main {
        font-family: 'Playfair Display', Georgia, serif !important;
        font-style: italic;
        font-size: 38px;
        font-weight: 700;
        letter-spacing: -0.015em;
        color: var(--time-text, var(--text-primary));
        line-height: 1.15;
    }
    .dash-header-right {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 6px;
    }
    .dash-clock {
        font-family: 'Playfair Display', Georgia, serif !important;
        font-size: 36px;
        font-weight: 700;
        letter-spacing: -0.015em;
        color: var(--time-accent, var(--accent-purple));
        line-height: 1.15;
    }
    .dash-period-badge {
        font-family: 'Plus Jakarta Sans', sans-serif !important;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 14px;
        border-radius: 999px;
        background: var(--badge-bg, rgba(255,255,255,0.15));
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--badge-text, var(--text-secondary));
    }
    .dash-period-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--badge-dot, var(--accent-purple));
        animation: pulseDot 2s ease-in-out infinite;
    }
    @keyframes pulseDot {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(0.85); }
    }
    @media (max-width: 600px) {
        .dash-header {
            flex-direction: column;
            align-items: flex-start;
            gap: 16px;
            padding: 28px 0 20px;
            margin-bottom: 24px;
        }
        .dash-header-right { align-items: flex-start; }
        .dash-date-main { font-size: 28px; }
        .dash-clock { font-size: 26px; }
    }

    /* ── Time-Period Gradients (main-content only) ─────────── */
    .main-content[data-time] {
        background-attachment: fixed;
        transition: background 0.8s ease;
        min-height: 100vh;
    }
    .main-content[data-time="night"] {
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #1a1a2e 100%);
        --time-text: #cbd5e1;
        --time-text-muted: #94a3b8;
        --time-accent: #a5b4fc;
        --glass-bg: rgba(255,255,255,0.06);
        --glass-border: rgba(255,255,255,0.10);
        --glass-hover: rgba(255,255,255,0.10);
        --badge-bg: rgba(255,255,255,0.08);
        --badge-text: #c7d2fe;
        --badge-dot: #a5b4fc;
    }
    .main-content[data-time="dawn"] {
        background: linear-gradient(135deg, #ede9fe 0%, #fce7f3 35%, #fff1e6 70%, #fef9c3 100%);
        --time-text: #3b0764;
        --time-text-muted: #6b21a8;
        --time-accent: #9333ea;
        --glass-bg: rgba(255,255,255,0.50);
        --glass-border: rgba(255,255,255,0.65);
        --glass-hover: rgba(255,255,255,0.60);
        --badge-bg: rgba(255,255,255,0.55);
        --badge-text: #7e22ce;
        --badge-dot: #c084fc;
    }
    .main-content[data-time="morning"] {
        background: linear-gradient(135deg, #dbeafe 0%, #e8f4fe 35%, #fefce8 70%, #fef9c3 100%);
        --time-text: #1e3a5f;
        --time-text-muted: #1e6091;
        --time-accent: #0369a1;
        --glass-bg: rgba(255,255,255,0.50);
        --glass-border: rgba(255,255,255,0.65);
        --glass-hover: rgba(255,255,255,0.60);
        --badge-bg: rgba(255,255,255,0.55);
        --badge-text: #0c4a6e;
        --badge-dot: #38bdf8;
    }
    .main-content[data-time="afternoon"] {
        background: linear-gradient(135deg, #fef9c3 0%, #fefce8 40%, #fffef5 70%, #fef8ee 100%);
        --time-text: #422006;
        --time-text-muted: #713f12;
        --time-accent: #a16207;
        --glass-bg: rgba(255,255,255,0.55);
        --glass-border: rgba(255,255,255,0.70);
        --glass-hover: rgba(255,255,255,0.65);
        --badge-bg: rgba(255,255,255,0.55);
        --badge-text: #854d0e;
        --badge-dot: #eab308;
    }
    .main-content[data-time="evening"] {
        background: linear-gradient(135deg, #fce7f3 0%, #fde8d8 50%, #fef3c7 100%);
        --time-text: #4a0d2b;
        --time-text-muted: #831843;
        --time-accent: #be185d;
        --glass-bg: rgba(255,255,255,0.45);
        --glass-border: rgba(255,255,255,0.60);
        --glass-hover: rgba(255,255,255,0.55);
        --badge-bg: rgba(255,255,255,0.50);
        --badge-text: #9d174d;
        --badge-dot: #f472b6;
    }
</style>
</head>
<body>
    <!-- Splash Screen Overlay -->
    <div id="splashScreen" class="splash-screen">
        <div class="splash-content">

                <div class="splash-loader-bar"></div>

    <button id="toggleSidebar" class="toggle-sidebar-btn">☰ Menu</button>

    <div class="app-shell">

        <main class="main-content">
            <!-- Dashboard Header -->
            <header class="dash-header animate-in" style="animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;">

                            <div class="stat-pastel-label">Total Savings</div>

            <!-- Quick Actions Card -->
            <section class="animate-in" style="animation: slideInLeft 0.5s ease both; animation-delay: 0.6s;">
                <div class="actions-minimal-row">

                        Log Expense
                    </a>
                    <a href="pages/fitness.html" class="action-minimal-btn">
                        Log Workout
                    </a>
                </div>
            </section>

            <!-- Bottom: Analytics & Trends (Tabbed Chart, full width) -->
            <section class="animate-in" style="margin-bottom: 36px; animation: fadeInUp 0.6s ease both; animation-delay: 0.7s;">
                <article class="chart-card-tabbed">
                    <div class="chart-tab-header">
                        <h3 id="activeChartTitle">Savings Growth</h3>
                        <div class="chart-tabs">
                            <button class="chart-tab-btn active" data-chart="growth">Savings</button>
                            <button class="chart-tab-btn" data-chart="expenses">Expenses</button>
                            <button class="chart-tab-btn" data-chart="loans">Goals</button>

                    <div class="chart-container">
                        <div class="chart-wrapper" id="wrapper-growth">
                            <canvas id="growthChart"></canvas>
                        </div>
                        <div class="chart-wrapper hidden" id="wrapper-expenses">
                            <canvas id="expensesChart"></canvas>

                        <div class="chart-wrapper hidden" id="wrapper-loans">
                            <canvas id="loanPayoffChart"></canvas>

        </main>
    </div>

    <script src="script.js"></script>
    <script>
    // Home page greeting and dynamic rendering logic
    (function() {
        // Splash screen fadeout logic
        const splash = document.getElementById('splashScreen');
        if (splash) {
            setTimeout(() => {
                splash.classList.add('fade-out');
                setTimeout(() => {
                    splash.remove();
                }, 500);
            }, 2000);
        }

        // ── Dashboard Header Clock & Time-Based Theme ─────────
        const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        const PERIOD_LABELS = {
            night:     'Late Night',
            dawn:      'Dawn',
            morning:   'Morning',
            afternoon: 'Afternoon',
            evening:   'Evening',
        };

        function getTimePeriod(h) {
            if (h < 5)  return 'night';
            if (h < 8)  return 'dawn';
            if (h < 12) return 'morning';
            if (h < 18) return 'afternoon';
            if (h < 21) return 'evening';
            return 'night';
        }

        function formatTime(date) {
            let h = date.getHours();
            const m = date.getMinutes().toString().padStart(2, '0');
            const ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            return `${h}:${m} ${ampm}`;
        }

        function updateDashboard() {
            const now    = new Date();
            const period = getTimePeriod(now.getHours());

            // Set time palette on <html> for global CSS vars (sidebar, text colors, etc.)
            document.documentElement.setAttribute('data-time', period);

            // Set time-based gradient on main content only
            const main = document.querySelector('.main-content');
            if (main) main.setAttribute('data-time', period);

            // Update day label
            const dayEl = document.getElementById('dashDayLabel');
            if (dayEl) dayEl.textContent = DAYS[now.getDay()];

            // Update date
            const dateEl = document.getElementById('dashDateMain');
            if (dateEl) dateEl.textContent = `${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;

            // Update clock
            const clockEl = document.getElementById('dashClock');
            if (clockEl) clockEl.textContent = formatTime(now);

            // Update period badge
            const periodEl = document.getElementById('dashPeriodLabel');
            if (periodEl) periodEl.textContent = PERIOD_LABELS[period];
        }

        updateDashboard();
        setInterval(updateDashboard, 1000);
        // ─────────────────────────────────────────────────────

        // Today's Focus persistence
        const focusInput = document.getElementById('todayFocusInput');
        if (focusInput) {
            const saved = localStorage.getItem('todayFocus');
            if (saved) focusInput.value = saved;
            focusInput.addEventListener('input', () => {
                localStorage.setItem('todayFocus', focusInput.value);
            });
        }
        
        // Dynamic summary metrics
        if(typeof updateSummaryCards === 'function') updateSummaryCards();

        // Chart tab switching logic
        const tabBtns = document.querySelectorAll('.chart-tab-btn');
        const wrappers = {
            growth: document.getElementById('wrapper-growth'),
            expenses: document.getElementById('wrapper-expenses'),
            loans: document.getElementById('wrapper-loans'),
            calories: document.getElementById('wrapper-calories')
        };
        const titles = {
            growth: 'Savings Growth',
            expenses: 'Expenses by Category',
            loans: 'Savings Goals Progress',
            calories: 'Calories Burned (Total)'
        };
        const titleEl = document.getElementById('activeChartTitle');

        function triggerChartRender(chartName) {
            if (typeof Chart === 'undefined') return;
            
            if (chartName === 'growth' && typeof creategrowthChart === 'function') {
                const canvas = document.getElementById('growthChart');
                if (canvas) {
                    const existing = Chart.getChart(canvas);
                    if (existing) existing.destroy();
                    creategrowthChart();
                }
            } else if (chartName === 'expenses' && typeof createExpensesChart === 'function') {
                const canvas = document.getElementById('expensesChart');
                if (canvas) {
                    const existing = Chart.getChart(canvas);
                    if (existing) existing.destroy();
                    createExpensesChart();
                }
            } else if (chartName === 'loans' && typeof createLoanPayoffChart === 'function') {
                const canvas = document.getElementById('loanPayoffChart');
                if (canvas) {
                    const existing = Chart.getChart(canvas);
                    if (existing) existing.destroy();
                    createLoanPayoffChart();
                }
            } else if (chartName === 'calories' && typeof renderCaloriesChart === 'function') {
                const canvas = document.getElementById('caloriesChart');
                if (canvas) {
                    const existing = Chart.getChart(canvas);
                    if (existing) existing.destroy();
                    renderCaloriesChart();
                }
            }
        }

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const targetChart = btn.getAttribute('data-chart');
                
                // Update active button state
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                // Update active title
                if (titleEl && titles[targetChart]) {
                    titleEl.textContent = titles[targetChart];
                }

                // Show/hide wrappers
                Object.keys(wrappers).forEach(key => {
                    if (wrappers[key]) {
                        if (key === targetChart) {
                            wrappers[key].classList.remove('hidden');
                        } else {
                            wrappers[key].classList.add('hidden');
                        }
                    }
                });

                // Trigger chart rendering
                triggerChartRender(targetChart);
            });
        });

        // Initialize default active chart (growth) on window load
        window.addEventListener('load', () => {
            triggerChartRender('growth');
        });
    })();
    </script>
</body>
</html>
