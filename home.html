<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Life Tracking System — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
    /* Splash Screen Overlay */
    .splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #0c0e14; /* Deep premium dark background */
        z-index: 10000;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.5s ease, visibility 0.5s ease;
        opacity: 1;
        visibility: visible;
    }

    .splash-screen.fade-out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
    }

    .splash-content {
        text-align: center;
        animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .splash-title {
        font-family: 'Inter', sans-serif !important; /* Maintain Inter for branding */
        font-size: 52px;
        font-weight: 800 !important;
        letter-spacing: 0.18em;
        margin-bottom: 12px;
        background: linear-gradient(135deg, #a78bfa 0%, #ec4899 50%, #3b82f6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-transform: uppercase;
        display: block;
    }

    .splash-subtitle {
        font-family: 'Inter', sans-serif !important;
        font-size: 13px;
        font-weight: 500 !important;
        color: #94a3b8;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        margin-bottom: 40px;
    }

    .splash-loader {
        width: 240px;
        height: 4px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 999px;
        margin: 0 auto;
        overflow: hidden;
        position: relative;
    }

    .splash-loader-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #a78bfa 0%, #ec4899 50%, #3b82f6 100%);
        border-radius: 999px;
        animation: loadBar 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes loadBar {
        0% { width: 0%; }
        50% { width: 60%; }
        100% { width: 100%; }
    }

    /* Clean Pastel Stats styling inspired by NeuroNest */
    .stats-pastel-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        margin-bottom: 24px;
    }
    .stat-pastel-card {
        border-radius: 24px;
        padding: 24px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        height: 172px;
        transition: transform 0.2s, box-shadow 0.2s;
        text-decoration: none;
        position: relative;
        overflow: hidden;
        backdrop-filter: blur(16px) saturate(1.4);
        -webkit-backdrop-filter: blur(16px) saturate(1.4);
    }
    .stat-pastel-card:hover {
        transform: translateY(-3px);
    }
    .stat-pastel-value {
        font-size: 30px;
        font-weight: 800;
        line-height: 1.1;
        margin-bottom: 4px;
    }
    .stat-pastel-label {
        font-size: 13px;
        font-weight: 600;
        opacity: 0.7;
    }

    /* Pastel glass colors for light and dark themes */
    .stat-pastel-green {
        background: rgba(220, 252, 231, 0.65) !important;
        border: 1px solid rgba(220, 252, 231, 0.4) !important;
        color: #14532d !important;
        box-shadow: 0 4px 20px rgba(22, 101, 52, 0.08);
    }
    [data-theme="dark"] .stat-pastel-green {
        background: rgba(34, 197, 94, 0.12) !important;
        border: 1px solid rgba(34, 197, 94, 0.25) !important;
        color: #4ade80 !important;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
    }

    .stat-pastel-blue {
        background: rgba(224, 242, 254, 0.65) !important;
        border: 1px solid rgba(224, 242, 254, 0.4) !important;
        color: #0c4a6e !important;
        box-shadow: 0 4px 20px rgba(3, 105, 161, 0.08);
    }
    [data-theme="dark"] .stat-pastel-blue {
        background: rgba(56, 189, 248, 0.12) !important;
        border: 1px solid rgba(56, 189, 248, 0.25) !important;
        color: #38bdf8 !important;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
    }

    .stat-pastel-yellow {
        background: rgba(254, 249, 195, 0.65) !important;
        border: 1px solid rgba(254, 249, 195, 0.4) !important;
        color: #713f12 !important;
        box-shadow: 0 4px 20px rgba(133, 77, 14, 0.08);
    }
    [data-theme="dark"] .stat-pastel-yellow {
        background: rgba(251, 191, 36, 0.12) !important;
        border: 1px solid rgba(251, 191, 36, 0.25) !important;
        color: #fbbf24 !important;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
    }

    .stat-pastel-purple {
        background: rgba(243, 232, 255, 0.65) !important;
        border: 1px solid rgba(243, 232, 255, 0.4) !important;
        color: #581c87 !important;
        box-shadow: 0 4px 20px rgba(107, 33, 168, 0.08);
    }
    [data-theme="dark"] .stat-pastel-purple {
        background: rgba(167, 139, 250, 0.12) !important;
        border: 1px solid rgba(167, 139, 250, 0.25) !important;
        color: #c084fc !important;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
    }

    .stat-pastel-icon-wrapper {
        margin-bottom: 8px;
        display: flex;
        align-items: center;
    }

    /* Glassmorphism base — reusable */
    .glass {
        background: rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(16px) saturate(1.4);
        -webkit-backdrop-filter: blur(16px) saturate(1.4);
        border: 1px solid rgba(255, 255, 255, 0.28);
        box-shadow: 0 4px 24px rgba(0,0,0,0.07), inset 0 1px 0 rgba(255,255,255,0.4);
    }
    [data-theme="dark"] .glass {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.09);
        box-shadow: 0 4px 24px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.07);
    }

    /* Tabbed Chart — glass */
    .chart-card-tabbed {
        border-radius: 20px;
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        width: 100%;
        background: rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(16px) saturate(1.4);
        -webkit-backdrop-filter: blur(16px) saturate(1.4);
        border: 1px solid rgba(255, 255, 255, 0.28);
        box-shadow: 0 4px 24px rgba(0,0,0,0.07), inset 0 1px 0 rgba(255,255,255,0.4);
    }
    [data-theme="dark"] .chart-card-tabbed {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .chart-tab-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
        border-bottom: 1px solid rgba(255,255,255,0.2);
        padding-bottom: 16px;
    }
    [data-theme="dark"] .chart-tab-header {
        border-bottom-color: rgba(255,255,255,0.08);
    }
    .chart-tab-header h3 {
        font-size: 18px;
        font-weight: 700;
        color: var(--text-primary);
    }
    .chart-tabs {
        display: flex;
        gap: 4px;
        background: rgba(0,0,0,0.06);
        padding: 4px;
        border-radius: 12px;
    }
    [data-theme="dark"] .chart-tabs {
        background: rgba(255,255,255,0.06);
    }
    .chart-tab-btn {
        background: transparent;
        border: none;
        padding: 6px 12px;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-secondary);
        cursor: pointer;
        border-radius: 8px;
        transition: all 0.2s ease;
    }
    .chart-tab-btn:hover { color: var(--text-primary); }
    .chart-tab-btn.active {
        background: rgba(255,255,255,0.5);
        color: var(--text-primary);
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    [data-theme="dark"] .chart-tab-btn.active {
        background: rgba(255,255,255,0.12);
    }
    .chart-wrapper { position: relative; height: 320px; width: 100%; }
    .chart-wrapper.hidden { display: none !important; }

    /* Action buttons — glass */
    .actions-minimal-row { display: flex; gap: 12px; margin-bottom: 32px; }
    .action-minimal-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px 24px;
        border-radius: 12px;
        color: var(--text-primary);
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.2s ease;
        background: rgba(255, 255, 255, 0.22);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.32);
    }
    [data-theme="dark"] .action-minimal-btn {
        background: rgba(255, 255, 255, 0.07);
        border-color: rgba(255, 255, 255, 0.1);
    }
    .action-minimal-btn:hover {
        background: rgba(255, 255, 255, 0.38);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }

    /* Focus Card — glass */
    .focus-minimal-card {
        border-radius: 20px;
        padding: 24px;
        margin-bottom: 24px;
        background: rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(16px) saturate(1.4);
        -webkit-backdrop-filter: blur(16px) saturate(1.4);
        border: 1px solid rgba(255, 255, 255, 0.28);
        box-shadow: 0 4px 24px rgba(0,0,0,0.07), inset 0 1px 0 rgba(255,255,255,0.4);
    }
    [data-theme="dark"] .focus-minimal-card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .focus-minimal-card .focus-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
    }
    .focus-minimal-card h3 {
        font-size: 14px;
        font-weight: 700;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }
    .focus-minimal-input {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid rgba(255,255,255,0.3);
        border-radius: 12px;
        background: rgba(255,255,255,0.2);
        color: var(--text-primary);
        font-family: inherit;
        font-size: 14px;
        font-weight: 500;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
    }
    [data-theme="dark"] .focus-minimal-input {
        background: rgba(255,255,255,0.06);
        border-color: rgba(255,255,255,0.1);
    }
    .focus-minimal-input:focus {
        border-color: rgba(255,255,255,0.6);
        box-shadow: 0 0 0 3px rgba(255,255,255,0.12);
    }

    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

    /* ── Main content — time-of-day gradient background ─────── */
    .main-content {
        transition: background 1.2s cubic-bezier(0.4,0,0.2,1);
    }

    /* Night */
    [data-time="night"] .main-content {
        background: linear-gradient(160deg, #0f0c29 0%, #1a1040 45%, #24243e 100%);
    }
    /* Dawn */
    [data-time="dawn"] .main-content {
        background: linear-gradient(160deg, #1a0533 0%, #6b2fa0 45%, #c44a08 100%);
    }
    /* Morning */
    [data-time="morning"] .main-content {
        background: linear-gradient(160deg, #7dd3fc 0%, #e0f2fe 45%, #fde68a 100%);
    }
    /* Afternoon */
    [data-time="afternoon"] .main-content {
        background: linear-gradient(160deg, #fde68a 0%, #fef9c3 45%, #fed7aa 100%);
    }
    /* Evening */
    [data-time="evening"] .main-content {
        background: linear-gradient(160deg, #fbcfe8 0%, #fce7f3 45%, #fed7aa 100%);
    }

    /* Dark mode variants */
    [data-time="night"][data-theme="dark"] .main-content {
        background: linear-gradient(160deg, #060810 0%, #0a0d1e 45%, #0e1228 100%);
    }
    [data-time="dawn"][data-theme="dark"] .main-content {
        background: linear-gradient(160deg, #100400 0%, #1c0c06 45%, #2a1008 100%);
    }
    [data-time="morning"][data-theme="dark"] .main-content {
        background: linear-gradient(160deg, #010d18 0%, #031828 45%, #051e30 100%);
    }
    [data-time="afternoon"][data-theme="dark"] .main-content {
        background: linear-gradient(160deg, #0c0800 0%, #161000 45%, #1e1600 100%);
    }
    [data-time="evening"][data-theme="dark"] .main-content {
        background: linear-gradient(160deg, #100208 0%, #160410 45%, #200818 100%);
    }

    /* ── Professional Dashboard Header ─────────────────────── */
    .dash-header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        padding: 40px 0 28px;
        border-bottom: 1px solid rgba(255,255,255,0.2);
        margin-bottom: 32px;
        gap: 16px;
        flex-wrap: wrap;
    }
    [data-theme="dark"] .dash-header {
        border-bottom-color: rgba(255,255,255,0.08);
    }
    .dash-header-left { display: flex; flex-direction: column; gap: 2px; }
    .dash-header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }

    /* ── Header date — synced to time period ───────────────── */
    .dash-date-label {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 15px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        line-height: 1;
    }
    .dash-date-main {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 58px;
        letter-spacing: 0.04em;
        line-height: 0.95;
        text-transform: uppercase;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    .dash-time {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 52px;
        letter-spacing: 0.06em;
        line-height: 0.95;
        font-variant-numeric: tabular-nums;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    /* Night — silver-blue date / deep navy time */
    [data-time="night"] .dash-date-label { color: #8899cc; }
    [data-time="night"] .dash-date-main  { background: linear-gradient(160deg, #b8cce8 0%, #d0e0f5 60%, #b8cce8 100%); }
    [data-time="night"] .dash-time       { background: linear-gradient(160deg, #1e2a5a 0%, #2d3f80 55%, #1a2450 100%); }

    [data-time="night"][data-theme="dark"] .dash-date-label { color: #6677aa; }
    [data-time="night"][data-theme="dark"] .dash-date-main  { background: linear-gradient(160deg, #8899cc 0%, #a0b4e0 55%, #8899cc 100%); }
    [data-time="night"][data-theme="dark"] .dash-time       { background: linear-gradient(160deg, #c8d8f0 0%, #dce8ff 55%, #c0d0ec 100%); }

    /* Dawn — rose-gold date / deep burgundy time */
    [data-time="dawn"] .dash-date-label { color: #f0a070; }
    [data-time="dawn"] .dash-date-main  { background: linear-gradient(160deg, #ffd8b8 0%, #ffe8d0 60%, #ffd0a8 100%); }
    [data-time="dawn"] .dash-time       { background: linear-gradient(160deg, #6a1a40 0%, #8a2050 55%, #601530 100%); }

    [data-time="dawn"][data-theme="dark"] .dash-date-label { color: #c07040; }
    [data-time="dawn"][data-theme="dark"] .dash-date-main  { background: linear-gradient(160deg, #c07040 0%, #d88050 55%, #b86030 100%); }
    [data-time="dawn"][data-theme="dark"] .dash-time       { background: linear-gradient(160deg, #ffd8b8 0%, #ffe8d0 55%, #ffc8a0 100%); }

    /* Morning — sky blue date / deep ocean time */
    [data-time="morning"] .dash-date-label { color: #0369a1; }
    [data-time="morning"] .dash-date-main  { background: linear-gradient(160deg, #082040 0%, #103060 60%, #082040 100%); }
    [data-time="morning"] .dash-time       { background: linear-gradient(160deg, #0ea5e9 0%, #38bdf8 55%, #0284c7 100%); }

    [data-time="morning"][data-theme="dark"] .dash-date-label { color: #38bdf8; }
    [data-time="morning"][data-theme="dark"] .dash-date-main  { background: linear-gradient(160deg, #b8e4ff 0%, #d0eeff 55%, #a8d8f8 100%); }
    [data-time="morning"][data-theme="dark"] .dash-time       { background: linear-gradient(160deg, #0a2a40 0%, #082030 55%, #041820 100%); }

    /* Afternoon — golden amber date / deep brown time */
    [data-time="afternoon"] .dash-date-label { color: #92400e; }
    [data-time="afternoon"] .dash-date-main  { background: linear-gradient(160deg, #1c1200 0%, #3a2400 60%, #1c1200 100%); }
    [data-time="afternoon"] .dash-time       { background: linear-gradient(160deg, #d97706 0%, #f59e0b 55%, #b45309 100%); }

    [data-time="afternoon"][data-theme="dark"] .dash-date-label { color: #fbbf24; }
    [data-time="afternoon"][data-theme="dark"] .dash-date-main  { background: linear-gradient(160deg, #f5e0a0 0%, #ffe8b0 55%, #e8cc80 100%); }
    [data-time="afternoon"][data-theme="dark"] .dash-time       { background: linear-gradient(160deg, #301c00 0%, #4a2a00 55%, #281400 100%); }

    /* Evening — dusty pink-mauve date / deep wine time */
    [data-time="evening"] .dash-date-label { color: #9d174d; }
    [data-time="evening"] .dash-date-main  { background: linear-gradient(160deg, #2d0a1e 0%, #4a1030 60%, #2d0a1e 100%); }
    [data-time="evening"] .dash-time       { background: linear-gradient(160deg, #be185d 0%, #db2777 55%, #9d174d 100%); }

    [data-time="evening"][data-theme="dark"] .dash-date-label { color: #f472b6; }
    [data-time="evening"][data-theme="dark"] .dash-date-main  { background: linear-gradient(160deg, #f0c0dc 0%, #ffd8ee 55%, #e8a8cc 100%); }
    [data-time="evening"][data-theme="dark"] .dash-time       { background: linear-gradient(160deg, #2a0418 0%, #3c0826 55%, #200210 100%); }

    /* Period badge — glass style */
    .dash-period-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 14px;
        border-radius: 999px;
        font-family: 'Bebas Neue', sans-serif;
        font-size: 13px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        background: rgba(255,255,255,0.2);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        border: 1px solid rgba(255,255,255,0.35);
        color: rgba(0,0,0,0.55);
    }
    [data-theme="dark"] .dash-period-badge {
        background: rgba(255,255,255,0.08);
        border-color: rgba(255,255,255,0.15);
        color: rgba(255,255,255,0.6);
    }
    .dash-period-dot {
        width: 6px; height: 6px;
        border-radius: 50%;
        background: currentColor;
        animation: pulse 2.5s ease-in-out infinite;
        flex-shrink: 0;
    }

    @media (max-width: 600px) {
        .dash-header { flex-direction: column; align-items: flex-start; padding: 28px 0 20px; }
        .dash-header-right { align-items: flex-start; }
        .dash-date-main { font-size: 44px; }
        .dash-time { font-size: 38px; }
    }
</style>
</head>
<body>
    <!-- Splash Screen Overlay -->
    <div id="splashScreen" class="splash-screen">
        <div class="splash-content">
            <h1 class="splash-title">DLT</h1>
            <p class="splash-subtitle">Daily Life Tracker</p>
            <div class="splash-loader">
                <div class="splash-loader-bar"></div>
            </div>
        </div>
    </div>

    <button id="toggleSidebar" class="toggle-sidebar-btn">☰ Menu</button>

    <div class="app-shell">
        <!-- Sidebar container starts collapsed on Home page -->
        <div id="sidebar" class="sidebar-container collapsed"></div>

        <main class="main-content">
            <!-- Dashboard Header -->
            <header class="dash-header animate-in" style="animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;">
                <div class="dash-header-left">
                    <span class="dash-date-label" id="dashDayLabel">Wednesday</span>
                    <h1 class="dash-date-main" id="dashDateMain">June 24, 2026</h1>
                </div>
                <div class="dash-header-right">
                    <span class="dash-time" id="dashClock">11:42 PM</span>
                    <span class="dash-period-badge">
                        <span class="dash-period-dot"></span>
                        <span id="dashPeriodText">Evening</span>
                    </span>
                </div>
            </header>

            <!-- Today's Focus Card -->
            <section class="animate-in" style="animation: slideInLeft 0.5s ease both; animation-delay: 0.1s;">
                <article class="focus-minimal-card">
                    <div class="focus-header">
                        <h3>Today's Focus</h3>
                    </div>
                    <input type="text" id="todayFocusInput" class="focus-minimal-input" placeholder="What is your #1 priority today?" />
                </article>
            </section>

            <!-- Quick Stats Section (Pastel Colored Cards) -->
            <section class="animate-in">
                <div class="stats-pastel-grid">
                    <a href="pages/fitness.html" class="stat-pastel-card stat-pastel-green" style="animation: slideInLeft 0.5s ease both; animation-delay: 0.2s;">
                        <div class="stat-pastel-icon-wrapper">

    <script src="script.js"></script>
    <script>
    // Home page greeting and dynamic rendering logic
    (function() {
        // Splash screen fadeout logic
        const splash = document.getElementById('splashScreen');
        if (splash) {
            setTimeout(() => {
                splash.classList.add('fade-out');
                setTimeout(() => {
                    splash.remove();
                }, 500);
            }, 2000);
        }

        // ── Dashboard Header Clock ────────────────────────────
        const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        const PERIODS = {
            night:     'Late Night',
            dawn:      'Dawn',
            morning:   'Morning',
            afternoon: 'Afternoon',
            evening:   'Evening',
        };

        function getTimePeriodLabel(h) {
            if (h < 5)  return 'night';
            if (h < 8)  return 'dawn';
            if (h < 12) return 'morning';
            if (h < 18) return 'afternoon';
            if (h < 21) return 'evening';
            return 'night';
        }

        function formatClock(d) {
            let h = d.getHours(), m = d.getMinutes();
            const ampm = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12;
            return `${h}:${String(m).padStart(2,'0')} ${ampm}`;
        }

        function updateDashHeader() {
            const now   = new Date();
            const day   = document.getElementById('dashDayLabel');
            const date  = document.getElementById('dashDateMain');
            const clock = document.getElementById('dashClock');
            const per   = document.getElementById('dashPeriodText');

            if (day)   day.textContent   = DAYS[now.getDay()];
            if (date)  date.textContent  = `${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
            if (clock) clock.textContent = formatClock(now);
            if (per)   per.textContent   = PERIODS[getTimePeriodLabel(now.getHours())];
        }

        updateDashHeader();
        setInterval(updateDashHeader, 30000);
        // ─────────────────────────────────────────────────────

        // Today's Focus persistence
        const focusInput = document.getElementById('todayFocusInput');
        if (focusInput) {
            const saved = localStorage.getItem('todayFocus');
            if (saved) focusInput.value = saved;
            focusInput.addEventListener('input', () => {
                localStorage.setItem('todayFocus', focusInput.value);
            });
        }
        
        // Dynamic summary metrics
        if(typeof updateSummaryCards === 'function') updateSummaryCards();

        // Chart tab switching logic
        const tabBtns = document.querySelectorAll('.chart-tab-btn');
        const wrappers = {
            growth: document.getElementById('wrapper-growth'),
            expenses: document.getElementById('wrapper-expenses'),
            loans: document.getElementById('wrapper-loans'),
            calories: document.getElementById('wrapper-calories')
        };
        const titles = {
            growth: 'Savings Growth',
            expenses: 'Expenses by Category',
            loans: 'Savings Goals Progress',
            calories: 'Calories Burned (Total)'
        };
        const titleEl = document.getElementById('activeChartTitle');

        function triggerChartRender(chartName) {
            if (typeof Chart === 'undefined') return;
            
            if (chartName === 'growth' && typeof creategrowthChart === 'function') {
                const canvas = document.getElementById('growthChart');
                if (canvas) {
                    const existing = Chart.getChart(canvas);
                    if (existing) existing.destroy();
                    creategrowthChart();
                }
            } else if (chartName === 'expenses' && typeof createExpensesChart === 'function') {
                const canvas = document.getElementById('expensesChart');
                if (canvas) {
                    const existing = Chart.getChart(canvas);
                    if (existing) existing.destroy();
                    createExpensesChart();
                }
            } else if (chartName === 'loans' && typeof createLoanPayoffChart === 'function') {
                const canvas = document.getElementById('loanPayoffChart');
                if (canvas) {
                    const existing = Chart.getChart(canvas);
                    if (existing) existing.destroy();
                    createLoanPayoffChart();
                }
            } else if (chartName === 'calories' && typeof renderCaloriesChart === 'function') {
                const canvas = document.getElementById('caloriesChart');
                if (canvas) {
                    const existing = Chart.getChart(canvas);
                    if (existing) existing.destroy();
                    renderCaloriesChart();
                }
            }
        }

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const targetChart = btn.getAttribute('data-chart');
                
                // Update active button state
                tabBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                // Update active title
                if (titleEl && titles[targetChart]) {
                    titleEl.textContent = titles[targetChart];
                }

                // Show/hide wrappers
                Object.keys(wrappers).forEach(key => {
                    if (wrappers[key]) {
                        if (key === targetChart) {
                            wrappers[key].classList.remove('hidden');
                        } else {
                            wrappers[key].classList.add('hidden');
                        }
                    }
                });

                // Trigger chart rendering
                triggerChartRender(targetChart);
            });
        });

        // Initialize default active chart (growth) on window load
        window.addEventListener('load', () => {
            triggerChartRender('growth');
        });
    })();
    </script>
